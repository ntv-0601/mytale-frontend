<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tale - Quản Trị Hệ Thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "sakura-light": "#FDF4F5",
                        "sakura-mid": "#F4C7CC",
                        "sakura-dark": "#E598A3",
                        "text-main": "#5C4044",
                        "text-muted": "#8A6E72"
                    },
                    fontFamily: {
                        sans: ["Quicksand", "sans-serif"],
                        handwriting: ["Dancing Script", "cursive"],
                    },
                    boxShadow: {
                        sakura: "0 4px 14px 0 rgba(229, 152, 163, 0.3)",
                        glass: "0 8px 32px 0 rgba(229, 152, 163, 0.15)"
                    }
                }
            }
        };
    </script>

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fdf4f5;
            background-image: radial-gradient(#f4c7cc 1px, transparent 1px);
            background-size: 24px 24px;
            color: #5c4044;
            min-height: 100vh;
        }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(229, 152, 163, 0.15);
        }
        .neon-btn {
            box-shadow: 0 4px 15px rgba(229, 152, 163, 0.4);
            transition: all 0.3s ease;
        }
        .neon-btn:hover {
            box-shadow: 0 6px 20px rgba(229, 152, 163, 0.6);
            transform: translateY(-2px);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #f4c7cc; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #e598a3; }
        
        .branch-decoration { position: fixed; z-index: -1; pointer-events: none; opacity: 0.6; filter: drop-shadow(2px 4px 6px rgba(229, 152, 163, 0.3)); }
        .branch-top-left { top: -20px; left: -20px; width: 300px; transform: rotate(15deg); }
        .branch-bottom-right { bottom: -20px; right: -20px; width: 250px; transform: rotate(195deg); }
        /* Hiệu ứng Đĩa than xoay */
      @keyframes spin-disk { 100% { transform: rotate(360deg); } }
      .spinning { animation: spin-disk 4s linear infinite; }
      .paused { animation-play-state: paused; }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-4 md:p-8 relative">

    <!-- Trang trí nền -->
    <svg class="branch-decoration branch-top-left text-[#7e6060]" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M -20,0 C 20,40 60,30 100,70 C 130,100 150,80 180,120" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="40" cy="30" r="12" fill="#F4C7CC" opacity="0.8" />
      <circle cx="35" cy="35" r="8" fill="#E598A3" />
      <circle cx="80" cy="50" r="10" fill="#F4C7CC" opacity="0.9" />
      <circle cx="120" cy="90" r="15" fill="#F4C7CC" opacity="0.7" />
      <circle cx="123" cy="93" r="7" fill="#E598A3" />
    </svg>

    <svg class="branch-decoration branch-bottom-right text-[#7e6060]" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M 200,200 C 160,160 120,170 80,130 C 50,100 30,120 0,80" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="160" cy="170" r="14" fill="#F4C7CC" opacity="0.8" />
      <circle cx="155" cy="165" r="6" fill="#E598A3" />
      <circle cx="100" cy="140" r="10" fill="#F4C7CC" opacity="0.9" />
    </svg>

    <div id="login-section" class="w-full max-w-md glass-panel p-8 md:p-10 rounded-[2rem] relative overflow-hidden transition-all duration-500 mt-20">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-sakura-mid rounded-full blur-[50px] opacity-60 pointer-events-none"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-sakura-light rounded-full blur-[40px] opacity-70 pointer-events-none"></div>
        
        <div class="text-center mb-8 relative z-10">
            <i class="ph-fill ph-flower-lotus text-6xl text-sakura-dark mb-2 drop-shadow-sm"></i>
            <h1 class="text-4xl font-bold text-sakura-dark tracking-wide font-handwriting mt-2">HỆ THỐNG</h1>
            <p class="text-text-muted mt-1 font-semibold">Xác thực quyền quản trị</p>
        </div>

        <form id="login-form" class="space-y-5 relative z-10">
            <div>
                <label class="block text-sm font-bold text-text-muted mb-2">Tài khoản</label>
                <input type="text" id="username" class="w-full px-5 py-3.5 rounded-xl bg-white/70 border border-sakura-mid focus:border-sakura-dark focus:ring-4 focus:ring-sakura-mid/30 text-text-main outline-none transition-all shadow-sm placeholder-text-muted/50" placeholder="Nhập tài khoản...">
            </div>
            <div>
                <label class="block text-sm font-bold text-text-muted mb-2">Mật khẩu</label>
                <input type="password" id="password" class="w-full px-5 py-3.5 rounded-xl bg-white/70 border border-sakura-mid focus:border-sakura-dark focus:ring-4 focus:ring-sakura-mid/30 text-text-main outline-none transition-all shadow-sm placeholder-text-muted/50" placeholder="••••••••">
            </div>
            
            <div id="error-msg" class="hidden text-rose-600 text-sm font-bold text-center bg-rose-50 py-3 rounded-xl border border-rose-200"></div>

            <button type="submit" class="w-full bg-sakura-dark hover:bg-[#d48895] text-white font-bold py-3.5 rounded-xl neon-btn mt-6 text-lg tracking-wide">
                TRUY CẬP KHO LƯU TRỮ
            </button>
        </form>
    </div>
    <div id="admin-dashboard" class="hidden w-full max-w-7xl glass-panel p-6 md:p-10 rounded-[2.5rem] relative z-10">
        
        <div class="flex flex-col sm:flex-row justify-between items-center mb-10 border-b border-sakura-mid/40 pb-6 gap-4">
            <div class="flex items-center gap-3">
                <i class="ph-fill ph-flower-lotus text-4xl text-sakura-dark drop-shadow-sm"></i>
                <h2 class="text-3xl sm:text-4xl font-bold text-sakura-dark font-handwriting">Bảng Điều Khiển Hệ Thống</h2>
            </div>
            <button onclick="logout()" class="text-text-muted hover:text-rose-600 transition-colors flex items-center gap-2 font-bold bg-white/50 px-4 py-2 rounded-xl shadow-sm border border-sakura-mid/30">
                <i class="ph-bold ph-sign-out text-xl"></i> Đăng xuất
            </button>
        </div>

        <div class="flex flex-col gap-10">
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                
                <div class="bg-white/60 p-6 md:p-8 rounded-2xl border border-sakura-mid/50 shadow-sm relative overflow-hidden">
                    <h3 class="text-2xl font-bold text-sakura-dark mb-6 flex items-center gap-2 font-handwriting">
                        <i class="ph-fill ph-plus-circle text-sakura-dark"></i> Thêm Truyện Mới
                    </h3>
                    <form id="add-story-form" class="space-y-4 relative z-10">
                        <div>
                            <label class="block text-sm font-bold text-text-muted mb-1">Tên truyện</label>
                            <input type="text" id="story-title" required class="w-full px-4 py-2.5 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 text-text-main outline-none transition-colors">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-text-muted mb-1">Định dạng</label>
                                <select id="story-format" class="w-full px-4 py-2.5 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 text-text-main outline-none">
                                    <option value="truyen-chu">Truyện Chữ</option>
                                    <option value="truyen-tranh">Truyện Tranh</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-text-muted mb-1">Tác giả</label>
                                <input type="text" id="story-author" required class="w-full px-4 py-2.5 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 text-text-main outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-text-muted mb-1">Ảnh Bìa Truyện</label>
                            <div class="flex items-center gap-3 mb-2">
                                <button type="button" id="btn-upload-cover" class="bg-white hover:bg-sakura-light text-text-main px-4 py-2.5 rounded-lg text-sm transition-colors border border-sakura-mid flex items-center gap-2 font-bold shadow-sm">
                                    <i class="ph-bold ph-upload-simple"></i> Chọn ảnh từ máy
                                </button>
                                <input type="file" id="cover-file-input" accept="image/*" class="hidden">
                                <span id="cover-upload-status" class="text-sm font-bold"></span>
                            </div>
                            <input type="text" id="story-image" placeholder="Link ảnh sẽ tự động hiện ở đây..." class="w-full px-4 py-2.5 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 text-text-main outline-none transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-text-muted mb-1">Thể loại (cách nhau dấu phẩy)</label>
                            <input type="text" id="story-tags" placeholder="VD: hoc-duong, tinh-cam" class="w-full px-4 py-2.5 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 text-text-main outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-text-muted mb-1">Mô tả ngắn</label>
                            <textarea id="story-desc" rows="3" class="w-full px-4 py-2.5 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 text-text-main outline-none resize-none"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-sakura-dark hover:bg-[#d48895] text-white font-bold py-3.5 rounded-xl neon-btn mt-4 transition-all">
                            XUẤT BẢN TRUYỆN
                        </button>
                        <div id="add-msg" class="hidden text-center mt-3 font-bold text-sm"></div>
                    </form>
                </div>

                <div class="lg:col-span-2 bg-white/60 p-6 md:p-8 rounded-2xl border border-sakura-mid/50 shadow-sm relative overflow-hidden flex flex-col h-full">
                    <h3 class="text-2xl font-bold text-sakura-dark mb-6 flex items-center gap-2 font-handwriting">
                        <i class="ph-fill ph-book-open-text text-sakura-dark"></i> Viết Chương Mới
                    </h3>
                    
                    <form id="add-chapter-form" class="space-y-5 relative z-10 flex-grow flex flex-col">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-bold text-text-muted mb-1">Chọn bộ truyện</label>
                                <select id="chapter-story-id" required class="w-full px-5 py-3 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 text-text-main outline-none font-medium">
                                    <option value="">-- Đang tải danh sách truyện... --</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-text-muted mb-1">Tiêu đề chương</label>
                                <input type="text" id="chapter-title" required placeholder="VD: Chương 1: Lần đầu gặp gỡ" class="w-full px-5 py-3 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 text-text-main outline-none font-medium">
                            </div>
                        </div>
                        
                        <div class="flex-grow flex flex-col">
                            <label class="block text-sm font-bold text-text-muted mb-2">Nội dung chương (Hỗ trợ HTML)</label>
                            <textarea id="chapter-content" rows="12" class="w-full px-5 py-4 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 text-text-main outline-none leading-relaxed flex-grow resize-y" placeholder="<p>Bầu trời tháng Chín trong vắt...</p>"></textarea>
                        </div>

                        <div class="bg-sakura-light/50 p-4 rounded-xl border border-sakura-mid/30 mt-4">
                            <label class="block text-sm font-bold text-text-muted mb-2">Link ảnh (Dành cho truyện tranh)</label>
                            <div class="flex items-center gap-3 mb-3">
                                <label for="file-input" id="btn-upload-img" class="cursor-pointer bg-white hover:bg-sakura-light text-text-main px-4 py-2.5 rounded-lg text-sm transition-colors border border-sakura-mid flex items-center gap-2 font-bold shadow-sm">
                                    <i class="ph-bold ph-upload-simple"></i> Chọn ảnh từ máy
                                </label>
                                <input type="file" id="file-input" multiple accept="image/*" class="hidden">
                                <span id="upload-status" class="text-sm font-bold"></span>
                            </div>
                            <textarea id="chapter-images" rows="3" class="w-full px-4 py-3 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 text-text-main outline-none leading-relaxed text-sm" placeholder="Các link ảnh sẽ tự động xuất hiện ở đây..."></textarea>
                        </div>
                        
                        <div class="bg-sakura-light/50 p-4 rounded-xl border border-sakura-mid/30 mt-4">
                            <label class="flex items-center gap-2 cursor-pointer text-sm font-bold text-text-main">
                                <input type="checkbox" id="chapter-has-poll" class="w-5 h-5 accent-sakura-dark rounded border-sakura-mid" onchange="document.getElementById('poll-fields').classList.toggle('hidden')">
                                Bật bình chọn cho chương này?
                            </label>
                            <div id="poll-fields" class="hidden space-y-3 mt-3 border-t border-sakura-mid/30 pt-3">
                                <input type="text" id="poll-question" placeholder="Câu hỏi (VD: Bạn thấy tình tiết chương này thế nào?)" class="w-full px-4 py-2 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark outline-none text-sm font-medium">
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                                    <input type="text" id="poll-opt-1" placeholder="Lựa chọn 1 (VD: Rất cuốn hút)" class="w-full px-4 py-2 rounded-xl bg-white/80 border border-sakura-mid outline-none text-sm">
                                    <input type="text" id="poll-opt-2" placeholder="Lựa chọn 2 (VD: Bình thường)" class="w-full px-4 py-2 rounded-xl bg-white/80 border border-sakura-mid outline-none text-sm">
                                    <input type="text" id="poll-opt-3" placeholder="Lựa chọn 3 (VD: Khá nhàm chán)" class="w-full px-4 py-2 rounded-xl bg-white/80 border border-sakura-mid outline-none text-sm">
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" class="w-full bg-sakura-dark hover:bg-[#d48895] text-white font-bold py-4 rounded-xl neon-btn mt-6 text-lg tracking-wide transition-all">
                            XUẤT BẢN CHƯƠNG TRUYỆN
                        </button>
                        <div id="chapter-msg" class="hidden text-center mt-3 font-bold text-sm"></div>
                    </form>
                </div>
            </div>

            <div class="bg-white/60 p-6 md:p-8 rounded-2xl border border-sakura-mid/50 shadow-sm relative overflow-hidden">
                <h3 class="text-2xl font-bold text-sakura-dark mb-6 flex items-center gap-2 font-handwriting">
                    <i class="ph-fill ph-pencil-simple text-sakura-dark"></i> Chỉnh Sửa Truyện & Chương
                </h3>
                <form id="edit-form" class="space-y-5 relative z-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 p-5 bg-sakura-light/60 rounded-xl border border-sakura-mid/40">
                        <div>
                            <label class="block text-sm font-bold text-text-muted mb-1">Chọn truyện cần sửa</label>
                            <select id="edit-story-id" onchange="loadStoryDataForEdit()" class="w-full px-5 py-3 rounded-xl bg-white border border-sakura-mid focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 text-text-main outline-none font-medium truncate">
                                <option value="">-- Chọn bộ truyện --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-text-muted mb-1">Chọn chương cần sửa (Bỏ trống nếu sửa truyện)</label>
                            <select id="edit-chapter-id" onchange="loadChapterDataForEdit()" class="w-full px-5 py-3 rounded-xl bg-white border border-sakura-mid focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 text-text-main outline-none font-medium truncate">
                                <option value="">-- Chọn truyện trước --</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-text-muted mb-1">Tên truyện / Tiêu đề chương</label>
                            <input type="text" id="edit-title" class="w-full px-5 py-3 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark text-text-main outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-text-muted mb-1">Trạng thái (Truyện)</label>
                            <select id="edit-status" class="w-full px-5 py-3 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark text-text-main outline-none">
                                <option value="Đang ra">Đang ra</option>
                                <option value="Hoàn thành">Hoàn thành</option>
                                <option value="Tạm ngưng">Tạm ngưng</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-5">
                        <div>
                            <label class="block text-sm font-bold text-text-muted mb-1">Tác giả (Chỉ dành cho truyện)</label>
                            <input type="text" id="edit-author" class="w-full px-5 py-3 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark text-text-main outline-none">
                        </div>
                        <div class="flex-grow flex flex-col">
                            <label class="block text-sm font-bold text-text-muted mb-2">Giới thiệu (nếu sửa truyện) / Nội dung (nếu sửa chương)</label>
                            <textarea id="edit-content" rows="8" class="w-full px-5 py-4 rounded-xl bg-white/80 border border-sakura-mid focus:border-sakura-dark text-text-main outline-none leading-relaxed flex-grow resize-y"></textarea>
                        </div>
                    </div>

                    <button type="button" onclick="luuChinhSuaThongTin()" class="w-full bg-sakura-dark hover:bg-[#d48895] text-white font-bold py-4 rounded-xl neon-btn mt-4 text-lg tracking-wide transition-all shadow-sm flex justify-center items-center gap-2">
                        <i class="ph-bold ph-floppy-disk text-xl"></i> LƯU THAY ĐỔI
                    </button>
                    <div id="edit-msg" class="hidden text-center mt-3 font-bold text-sm"></div>
                </form>
            </div>

            <div class="bg-white/60 p-6 md:p-8 rounded-2xl border border-sakura-mid/50 shadow-sm relative overflow-hidden">
                <h3 class="text-2xl font-bold text-sakura-dark mb-6 flex items-center gap-2 font-handwriting">
                    <i class="ph-fill ph-chart-pie-slice text-sakura-dark"></i> Thống Kê Bình Chọn
                </h3>
                <div class="mb-6">
                    <label class="block text-sm font-bold text-text-main mb-2">Chọn truyện để xem thống kê:</label>
                    <select id="stat-story-id" onchange="loadPollStats()" class="w-full md:w-1/2 px-4 py-3 rounded-xl bg-white border border-sakura-mid text-text-main focus:border-sakura-dark focus:ring-2 focus:ring-sakura-mid/30 outline-none truncate font-medium">
                        <option value="">-- Chọn bộ truyện --</option>
                    </select>
                </div>
                <div id="poll-stats-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <p class="text-text-muted text-sm italic">Vui lòng chọn truyện để hiển thị kết quả.</p>
                </div>
            </div>

            <div class="bg-rose-50/90 p-6 md:p-8 rounded-2xl border border-rose-200 shadow-sm relative overflow-hidden">
                <h3 class="text-2xl font-bold text-rose-600 mb-6 flex items-center gap-2 font-handwriting">
                    <i class="ph-fill ph-trash text-rose-500"></i> Quản Lý & Xóa Dữ Liệu
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">
                    <div class="p-6 bg-white/80 border border-rose-200 rounded-xl flex flex-col justify-between shadow-sm hover:shadow-md transition-shadow">
                        <div>
                            <label class="block text-sm font-bold text-text-main mb-2">Xóa toàn bộ 1 bộ truyện</label>
                            <select id="delete-story-id" class="w-full px-4 py-3 rounded-xl bg-white border border-rose-200 text-text-main focus:border-rose-400 focus:ring-2 focus:ring-rose-200 outline-none truncate font-medium"></select>
                        </div>
                        <button onclick="deleteStory()" class="w-full mt-6 bg-rose-500 hover:bg-rose-600 text-white px-4 py-3.5 rounded-xl font-bold transition-colors flex items-center justify-center gap-2 shadow-sm">
                            <i class="ph-bold ph-trash text-lg"></i> XÓA TRUYỆN NÀY
                        </button>
                    </div>

                    <div class="p-6 bg-white/80 border border-rose-200 rounded-xl flex flex-col justify-between shadow-sm hover:shadow-md transition-shadow">
                        <div>
                            <label class="block text-sm font-bold text-text-main mb-2">Xóa 1 chương của truyện</label>

    <script>
        // Xử lý sự kiện khi bấm nút ĐĂNG TRUYỆN
        const addStoryForm = document.getElementById('add-story-form');
        const addMsg = document.getElementById('add-msg');

        addStoryForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const token = localStorage.getItem('mytales_token');
            if (!token) {
                alert('Phiên đăng nhập đã hết hạn. Vui lòng tải lại trang!');
                return;
            }

            const rawTags = document.getElementById('story-tags').value;
            const newStoryData = {
                title: document.getElementById('story-title').value,
                format: document.getElementById('story-format').value,
                author: document.getElementById('story-author').value,
                image: document.getElementById('story-image').value,
                desc: document.getElementById('story-desc').value,
                tags: rawTags.split(',').map(tag => tag.trim()).filter(tag => tag !== "")
            };

            try {
                const response = await fetch('https://my-tale.onrender.com/api/stories', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token 
                    },
                    body: JSON.stringify(newStoryData)
                });

                const data = await response.json();

                if (response.ok) {
                    addMsg.innerText = "🎉 Đăng truyện mới thành công!";
                    addMsg.className = "text-center mt-3 font-bold text-sm text-green-600 bg-green-100 py-2 rounded-lg block border border-green-200";
                    addStoryForm.reset(); 
                    loadStoriesForDropdown(); // Cập nhật lại list truyện ngay lập tức
                } else {
                    addMsg.innerText = "❌ " + (data.message || "Có lỗi xảy ra");
                    addMsg.className = "text-center mt-3 font-bold text-sm text-rose-600 bg-rose-100 py-2 rounded-lg block border border-rose-200";
                }
            } catch (error) {
                addMsg.innerText = "❌ Lỗi kết nối đến máy chủ!";
                addMsg.className = "text-center mt-3 font-bold text-sm text-rose-600 bg-rose-100 py-2 rounded-lg block border border-rose-200";
            }
        });

        // Xử lý đăng nhập
        const loginForm = document.getElementById('login-form');
        const loginSection = document.getElementById('login-section');
        const adminDashboard = document.getElementById('admin-dashboard');
        const errorMsg = document.getElementById('error-msg');

        if (localStorage.getItem('mytales_token')) {
            showDashboard();
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('https://my-tale.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('mytales_token', data.token);
                    showDashboard();
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.innerText = "Lỗi kết nối đến máy chủ!";
                errorMsg.classList.remove('hidden');
            }
        });

        function showDashboard() {
            loginSection.classList.add('hidden');
            adminDashboard.classList.remove('hidden');
            document.body.classList.remove('items-center'); // Cho form dịch lên trên
            loadStoriesForDropdown(); 
        }

        function logout() {
            localStorage.removeItem('mytales_token');
            location.reload();
        }

        // Tải danh sách truyện
        let globalStories = []; 

        async function loadStoriesForDropdown() {
            try {
                const defaultOption = '<option value="">-- Chọn bộ truyện --</option>';
                
                const selectStatStory = document.getElementById('stat-story-id');
                const selectAddChap = document.getElementById('chapter-story-id');
                const selectDelStory = document.getElementById('delete-story-id');
                const selectStoryForChap = document.getElementById('select-story-for-chapter');
                // Thêm ô select của phần Chỉnh Sửa
                const selectEditStory = document.getElementById('edit-story-id'); 
                
                // Gán Option mặc định trước
                if(selectStatStory) selectStatStory.innerHTML = defaultOption;
                if(selectAddChap) selectAddChap.innerHTML = defaultOption;
                if(selectDelStory) selectDelStory.innerHTML = defaultOption;
                if(selectStoryForChap) selectStoryForChap.innerHTML = defaultOption;
                if(selectEditStory) selectEditStory.innerHTML = defaultOption; // Reset ô chỉnh sửa

                const response = await fetch('https://my-tale.onrender.com/api/stories');
                globalStories = await response.json();
                
                // Vòng lặp nhét từng truyện vào các ô chọn
                globalStories.forEach(story => {
                    const opt = `<option value="${story._id}">${story.title}</option>`;
                    if(selectStatStory) selectStatStory.innerHTML += opt;
                    if(selectAddChap) selectAddChap.innerHTML += opt;
                    if(selectDelStory) selectDelStory.innerHTML += opt;
                    if(selectStoryForChap) selectStoryForChap.innerHTML += opt;
                    if(selectEditStory) selectEditStory.innerHTML += opt; // Bơm dữ liệu vào ô chỉnh sửa
                });
            } catch (error) {
                console.error("Lỗi tải truyện:", error);
            }
        }
        function loadPollStats() {
                const storyId = document.getElementById('stat-story-id').value;
                const container = document.getElementById('poll-stats-container');
                if(!storyId) { 
                    container.innerHTML = '<p class="text-text-muted text-sm italic">Vui lòng chọn truyện để hiển thị kết quả.</p>'; 
                    return; 
                }
                
                const story = globalStories.find(s => s._id === storyId);
                if(!story || !story.chaptersData || story.chaptersData.length === 0) {
                    container.innerHTML = '<p class="text-text-muted text-sm">Truyện này chưa có chương nào.</p>'; return;
                }

                let html = '';
                story.chaptersData.forEach(chap => {
                    if(chap.hasPoll && chap.pollData) {
                        const totalVotes = chap.pollData.options.reduce((sum, opt) => sum + opt.votes, 0);
                        html += `<div class="p-5 bg-white border border-sakura-mid/60 rounded-xl shadow-sm">
                            <h4 class="font-bold text-text-main text-lg mb-1 truncate">${chap.title}</h4>
                            <p class="text-sm font-semibold text-sakura-dark mb-4">${chap.pollData.question}</p>
                            <div class="space-y-3">`;
                        
                        chap.pollData.options.forEach(opt => {
                            const percent = totalVotes === 0 ? 0 : Math.round((opt.votes / totalVotes) * 100);
                            html += `
                                <div class="relative w-full bg-sakura-light rounded-lg h-7 overflow-hidden border border-sakura-mid/30">
                                    <div class="absolute top-0 left-0 h-full bg-sakura-mid/80 transition-all duration-500" style="width: ${percent}%"></div>
                                    <div class="absolute inset-0 flex items-center justify-between px-3 text-[11px] font-bold text-text-main z-10">
                                        <span class="truncate pr-2">${opt.text}</span>
                                        <span>${percent}% (${opt.votes})</span>
                                    </div>
                                </div>`;
                        });
                        html += `</div></div>`;
                    }
                });
                container.innerHTML = html || '<p class="text-text-muted text-sm">Các chương của truyện này không bật tính năng bình chọn.</p>';
}
        // Xử lý nút XUẤT BẢN CHƯƠNG TRUYỆN
        const addChapterForm = document.getElementById('add-chapter-form');
        const chapterMsg = document.getElementById('chapter-msg');
        
        // TẢI ẢNH TỪ MÁY TÍNH
        const btnUpload = document.getElementById('btn-upload-img');
        const fileInput = document.getElementById('file-input');
        const uploadStatus = document.getElementById('upload-status');
        const chapterImages = document.getElementById('chapter-images');

        const btnUploadCover = document.getElementById('btn-upload-cover');
        const coverFileInput = document.getElementById('cover-file-input');
        const coverUploadStatus = document.getElementById('cover-upload-status');

        // 2. Khi bấm vào nút "Chọn ảnh từ máy" -> Ép hệ thống tự động bấm vào thẻ input ẩn
        btnUploadCover.addEventListener('click', function() {
            coverFileInput.click(); 
        });

        // 3. (Tùy chọn thêm) Khi đã chọn xong ảnh, hiển thị tên ảnh ra màn hình cho trực quan
        coverFileInput.addEventListener('change', async function(e) {
        if (e.target.files.length > 0) {
            const file = e.target.files[0];
            
            // --- BẢN VÁ 1: LẤY THẺ THÔNG HÀNH (TOKEN) ---
            const token = localStorage.getItem('mytales_token');
            if (!token) {
                alert('Phiên đăng nhập đã hết hạn. Vui lòng tải lại trang!');
                return;
            }

        coverUploadStatus.textContent = "Đang tải ảnh lên máy chủ...";
        coverUploadStatus.className = 'text-blue-600 text-sm font-bold';

        const formData = new FormData();
        // --- BẢN VÁ 2: ĐỔI NHÃN THÀNH 'images' CHO KHỚP VỚI BACKEND ---
        formData.append('images', file); 

        try {
            const response = await fetch('https://my-tale.onrender.com/api/upload', {
                method: 'POST',
                headers: {
                    // --- BẢN VÁ 3: GẮN TOKEN VÀO YÊU CẦU ---
                    'Authorization': 'Bearer ' + token
                },
                body: formData
            });
            const data = await response.json();

            if (response.ok) {
                // --- BẢN VÁ 4: LẤY ĐÚNG TÊN BIẾN 'urls' MÀ BACKEND TRẢ VỀ ---
                const imageUrl = data.urls[0]; 
                
                if (imageUrl) {
                    const linkInput = document.querySelector('input[placeholder*="Link ảnh"]');
                    if (linkInput) {
                        linkInput.value = imageUrl;
                    }
                    coverUploadStatus.textContent = "Tải lên thành công: " + file.name;
                    coverUploadStatus.className = 'text-green-600 text-sm font-bold';
                }
            } else {
                coverUploadStatus.textContent = "Lỗi: " + data.message;
                coverUploadStatus.className = 'text-red-600 text-sm font-bold';
            }
        } catch (error) {
            console.error(error);
            coverUploadStatus.textContent = "Lỗi kết nối đến máy chủ!";
            coverUploadStatus.className = 'text-red-600 text-sm font-bold';
        }
    } else {
        coverUploadStatus.textContent = "";
    }
});

        fileInput.addEventListener('change', async () => {
            if (fileInput.files.length === 0) return;

            const token = localStorage.getItem('mytales_token');
            if (!token) return alert('Vui lòng đăng nhập lại!');

            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('images', fileInput.files[i]);
            }

            uploadStatus.innerText = "⏳ Đang tải lên...";
            uploadStatus.className = "text-sm font-bold text-amber-600";
            btnUpload.disabled = true;
            btnUpload.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const response = await fetch('https://my-tale.onrender.com/api/upload', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData 
                });

                const data = await response.json();
                if (response.ok) {
                    const newLinks = data.urls.join('\n');
                    const currentText = chapterImages.value;
                    chapterImages.value = currentText ? currentText + '\n' + newLinks : newLinks;
                    
                    uploadStatus.innerText = "✅ Tải ảnh thành công!";
                    uploadStatus.className = "text-sm font-bold text-green-600";
                } else {
                    uploadStatus.innerText = "❌ Lỗi: " + data.message;
                    uploadStatus.className = "text-sm font-bold text-rose-600";
                }
            } catch (error) {
                uploadStatus.innerText = "❌ Lỗi kết nối máy chủ!";
                uploadStatus.className = "text-sm font-bold text-rose-600";
            } finally {
                btnUpload.disabled = false;
                btnUpload.classList.remove('opacity-50', 'cursor-not-allowed');
                fileInput.value = ""; 
                setTimeout(() => uploadStatus.innerText = "", 4000);
            }
        });

        // Xử lý submit Chương mới
        addChapterForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('mytales_token');
            if (!token) return alert('Phiên đăng nhập hết hạn!');

            const storyId = document.getElementById('chapter-story-id').value;
            const title = document.getElementById('chapter-title').value;
            const content = document.getElementById('chapter-content').value;
            
            // Lấy thêm mảng ảnh từ ô textarea ảnh
            const rawImages = document.getElementById('chapter-images').value;
            const images = rawImages.split('\n').map(img => img.trim()).filter(img => img !== "");
            const hasPoll = document.getElementById('chapter-has-poll').checked;
            let pollData = null;
            if (hasPoll) {
                const opts = [
                    document.getElementById('poll-opt-1').value.trim(),
                    document.getElementById('poll-opt-2').value.trim(),
                    document.getElementById('poll-opt-3').value.trim()
                ].filter(o => o !== ''); // Lọc bỏ ô trống
                
                pollData = {
                    question: document.getElementById('poll-question').value || "Bạn thấy chương này thế nào?",
                    options: opts.map(opt => ({ text: opt, votes: 0 }))
                };
            }
            try {
                const response = await fetch(`https://my-tale.onrender.com/api/stories/${storyId}/chapters`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    // ĐOẠN GÂY LỖI NẰM Ở ĐÂY: Quên gửi hasPoll và pollData
                    body: JSON.stringify({ title, content, images, hasPoll, pollData })
                });

                const data = await response.json();

                if (response.ok) {
                    chapterMsg.innerText = "🎉 " + data.message;
                    chapterMsg.className = "text-center mt-3 font-bold text-sm text-green-600 bg-green-100 py-2 rounded-lg block border border-green-200";
                    // Reset form sau khi đăng
                    document.getElementById('chapter-title').value = '';
                    document.getElementById('chapter-content').value = '';
                    document.getElementById('chapter-images').value = '';
                } else {
                    chapterMsg.innerText = "❌ " + data.message;
                    chapterMsg.className = "text-center mt-3 font-bold text-sm text-rose-600 bg-rose-100 py-2 rounded-lg block border border-rose-200";
                }
            } catch (error) {
                chapterMsg.innerText = "❌ Lỗi kết nối đến máy chủ!";
                chapterMsg.className = "text-center mt-3 font-bold text-sm text-rose-600 bg-rose-100 py-2 rounded-lg block border border-rose-200";
            }

        // Chọn Truyện để load chương
        function loadChaptersForDelete() {
            const storyId = document.getElementById('select-story-for-chapter').value;
            const selectChap = document.getElementById('delete-chapter-id');
            selectChap.innerHTML = '<option value="">-- Chọn chương cần xóa --</option>';
            
            if(!storyId) return;
            
            const story = globalStories.find(s => s._id === storyId);
            if(story && story.chaptersData) {
                story.chaptersData.forEach(chap => {
                    selectChap.innerHTML += `<option value="${chap._id}">${chap.title}</option>`;
                });
            }
        }

        // API Xóa Truyện
        async function deleteStory() {
            const storyId = document.getElementById('delete-story-id').value;
            if(!storyId) return alert("Vui lòng chọn truyện cần xóa!");
            if(!confirm("Bạn có chắc chắn muốn XÓA TOÀN BỘ truyện này không? Không thể hoàn tác!")) return;

            const token = localStorage.getItem('mytales_token');
            try {
                const response = await fetch(`https://my-tale.onrender.com/api/stories/${storyId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if(response.ok) {
                    alert("Xóa truyện thành công!");
                    loadStoriesForDropdown();
                }
            } catch (e) { alert("Lỗi kết nối!"); }
        }

        // API Xóa Chương
        async function deleteChapter() {
            const storyId = document.getElementById('select-story-for-chapter').value;
            const chapterId = document.getElementById('delete-chapter-id').value;
            if(!storyId || !chapterId) return alert("Vui lòng chọn đủ truyện và chương!");
            if(!confirm("Bạn có chắc chắn muốn xóa chương này?")) return;

            const token = localStorage.getItem('mytales_token');
            try {
                const response = await fetch(`https://my-tale.onrender.com/api/stories/${storyId}/chapters/${chapterId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if(response.ok) {
                    alert("Xóa chương thành công!");
                    loadStoriesForDropdown();
                    document.getElementById('delete-chapter-id').innerHTML = '<option value="">-- Chọn chương cần xóa --</option>';
                }
            } catch (e) { alert("Lỗi kết nối!"); }
        }
        // --- HỆ THỐNG TRÌNH PHÁT NHẠC (BẢN CHUẨN) ---
        
        // 1. Luôn luôn khai báo hàm toàn cục trước
        window.toggleMusic = function() {
            const audio = document.getElementById('bg-audio');
            if (!audio) return; // Không có nhạc thì đứng im
            
            const disk = document.getElementById('record-disk');
            const playBtnIcon = document.getElementById('icon-play-pause');
            
            if (audio.paused) {
                audio.play();
                if(disk) { disk.classList.add('spinning'); disk.classList.remove('paused'); }
                if(playBtnIcon) playBtnIcon.classList.replace('ph-play-circle', 'ph-pause-circle');
                localStorage.setItem('mytale_music_playing', 'true');
            } else {
                audio.pause();
                if(disk) disk.classList.add('paused');
                if(playBtnIcon) playBtnIcon.classList.replace('ph-pause-circle', 'ph-play-circle');
                localStorage.setItem('mytale_music_playing', 'false');
            }
        };

        // 2. Chờ trang web tải xong 100% mới khôi phục trí nhớ
        window.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-audio');
            if (!audio) return;

            const disk = document.getElementById('record-disk');
            const playBtnIcon = document.getElementById('icon-play-pause');
            const volumeSlider = document.getElementById('volume-slider');

            const savedTime = localStorage.getItem('mytale_music_time') || 0;
            const isPlaying = localStorage.getItem('mytale_music_playing') === 'true';
            const savedVolume = localStorage.getItem('mytale_music_volume') || 0.5;

            audio.volume = savedVolume;
            if (volumeSlider) volumeSlider.value = savedVolume;
            audio.currentTime = savedTime;

            if (isPlaying) {
                audio.play().then(() => {
                    if(disk) { disk.classList.add('spinning'); disk.classList.remove('paused'); }
                    if(playBtnIcon) playBtnIcon.classList.replace('ph-play-circle', 'ph-pause-circle');
                }).catch(() => {
                    // Nếu trình duyệt chặn tự động phát
                    if(disk) disk.classList.add('paused');
                    if(playBtnIcon) playBtnIcon.classList.replace('ph-pause-circle', 'ph-play-circle');
                    localStorage.setItem('mytale_music_playing', 'false');
                });
            }

            if (volumeSlider) {
                volumeSlider.addEventListener('input', (e) => {
                    audio.volume = e.target.value;
                    localStorage.setItem('mytale_music_volume', e.target.value);
                });
            }

            setInterval(() => {
                if (!audio.paused) {
                    localStorage.setItem('mytale_music_time', audio.currentTime);
                }
            }, 1000);
        });

// Hàm tải dữ liệu Truyện lên Form
function loadStoryDataForEdit() {
    const storyId = document.getElementById('edit-story-id').value;
    const selectChap = document.getElementById('edit-chapter-id');
    const titleInput = document.getElementById('edit-title');
    const authorInput = document.getElementById('edit-author');
    const contentInput = document.getElementById('edit-content');
    const statusSelect = document.getElementById('edit-status');

    // Reset chương
    selectChap.innerHTML = '<option value="">-- Chọn chương cần sửa (Bỏ trống nếu sửa truyện) --</option>';
    
    if(!storyId) {
        titleInput.value = ''; authorInput.value = ''; contentInput.value = '';
        return;
    }

    const story = globalStories.find(s => s._id === storyId);
    if(story) {
        titleInput.value = story.title || '';
        authorInput.value = story.author || '';
        contentInput.value = story.desc || '';
        if (story.status) statusSelect.value = story.status;

        // Tải danh sách chương vào dropdown
        if(story.chaptersData) {
            story.chaptersData.forEach(chap => {
                selectChap.innerHTML += `<option value="${chap._id}">${chap.title}</option>`;
            });
        }
    }
}

// Hàm tải dữ liệu Chương lên Form
function loadChapterDataForEdit() {
    const storyId = document.getElementById('edit-story-id').value;
    const chapterId = document.getElementById('edit-chapter-id').value;
    const titleInput = document.getElementById('edit-title');
    const authorInput = document.getElementById('edit-author');
    const contentInput = document.getElementById('edit-content');

    if(!chapterId) {
        loadStoryDataForEdit();
        return;
    }

    const story = globalStories.find(s => s._id === storyId);
    if(story && story.chaptersData) {
        const chapter = story.chaptersData.find(c => c._id === chapterId);
        if (chapter) {
            titleInput.value = chapter.title || '';
            authorInput.value = 'Không áp dụng cho chương';
            authorInput.disabled = true; 
            contentInput.value = chapter.content || '';
        }
    }
}

// Hàm Lưu Chỉnh Sửa (Kích hoạt bằng onclick)
async function luuChinhSuaThongTin() {
    const token = localStorage.getItem('mytales_token');
    if (!token) return alert('Phiên đăng nhập hết hạn!');

    const storyId = document.getElementById('edit-story-id').value;
    const chapterId = document.getElementById('edit-chapter-id').value;
    const thongBaoSua = document.getElementById('edit-msg');
    
    if (!storyId) return alert('Vui lòng chọn truyện cần sửa!');

    const isEditingChapter = chapterId !== "";
    
    const endpoint = isEditingChapter 
        ? `https://my-tale.onrender.com/api/stories/${storyId}/chapters/${chapterId}`
        : `https://my-tale.onrender.com/api/stories/${storyId}`;

    const payload = isEditingChapter 
        ? {
            title: document.getElementById('edit-title').value,
            content: document.getElementById('edit-content').value
        } 
        : {
            title: document.getElementById('edit-title').value,
            author: document.getElementById('edit-author').value,
            desc: document.getElementById('edit-content').value,
            status: document.getElementById('edit-status').value
        };

    try {
        const response = await fetch(endpoint, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
            thongBaoSua.innerText = "🎉 Cập nhật thành công!";
            thongBaoSua.className = "text-center mt-3 font-bold text-sm text-green-600 bg-green-100 py-2 rounded-lg block border border-green-200";
            thongBaoSua.classList.remove('hidden');
            loadStoriesForDropdown(); // Tải lại dữ liệu mới nhất
            setTimeout(() => { thongBaoSua.classList.add('hidden'); }, 3000);
        } else {
            thongBaoSua.innerText = "❌ " + (data.message || "Lỗi cập nhật");
            thongBaoSua.className = "text-center mt-3 font-bold text-sm text-rose-600 bg-rose-100 py-2 rounded-lg block border border-rose-200";
            thongBaoSua.classList.remove('hidden');
        }
    } catch (error) {
        thongBaoSua.innerText = "❌ Lỗi kết nối đến máy chủ!";
        thongBaoSua.className = "text-center mt-3 font-bold text-sm text-rose-600 bg-rose-100 py-2 rounded-lg block border border-rose-200";
        thongBaoSua.classList.remove('hidden');
    }
}
    
    
    </script>

        <div class="relative w-12 h-12 flex-shrink-0 cursor-pointer" onclick="toggleMusic()">
            <img id="record-disk" src="AVT/dia_nhac.jpg" alt="Vinyl" class="w-full h-full rounded-full object-cover shadow-sm transition-transform">
            <div class="absolute inset-0 rounded-full border-2 border-sakura-dark/30 flex items-center justify-center">
                <div class="w-3 h-3 bg-white rounded-full shadow-inner"></div>
            </div>
        </div>

        <div class="hidden md:flex group-hover:flex flex-col gap-1 w-full overflow-hidden transition-all">
            <div class="flex items-center justify-between gap-2">
                <button onclick="toggleMusic()" class="text-sakura-dark hover:text-rose-500 transition-colors">
