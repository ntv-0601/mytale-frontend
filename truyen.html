<!doctype html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đọc Truyện - My Tale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              "sakura-light": "#FDF4F5",
              "sakura-mid": "#F4C7CC",
              "sakura-dark": "#E598A3",
              "text-main": "#5C4044",
              "text-muted": "#8A6E72",
              "night-bg": "#0f172a",
              "night-surface": "#1e293b",
              "night-border": "#334155",
              "night-text": "#e2e8f0",
              "night-text-muted": "#94a3b8",
              "night-accent": "#60a5fa"
            },
            fontFamily: {
              sans: ["Quicksand", "sans-serif"],
              handwriting: ["Dancing Script", "cursive"],
            }
          }
        }
      };
    </script>
    <style>
      body {
        font-family: 'Quicksand', sans-serif;
        background-color: #fdf4f5;
        color: #5c4044;
      }
      .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
      .reading-content p { margin-bottom: 1.5rem; text-indent: 1.5rem; font-size: 1.125rem; line-height: 1.8; }
      .reading-content img { border-radius: 0.5rem; margin-bottom: 1rem; width: 100%; height: auto; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <header class="max-w-5xl mx-auto w-full mb-6 flex justify-between items-center">
        <button onclick="window.location.href='index.html'" class="flex items-center gap-2 text-sakura-dark font-bold bg-white px-5 py-2.5 rounded-full shadow-sm border border-sakura-mid/30 hover:bg-sakura-light transition-colors">
            <i class="ph-bold ph-house"></i> Về Trang Chủ
        </button>
        <div class="font-handwriting text-3xl font-bold text-sakura-dark">My Tale</div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto w-full relative">
        
        <div id="view-detail" class="glass-panel rounded-3xl p-6 md:p-8 shadow-sm border border-white">
            <div class="flex flex-col md:flex-row gap-8">
                <div class="w-full md:w-1/3 lg:w-1/4 flex flex-col items-center">
                    <div class="w-48 md:w-full aspect-[3/4] rounded-2xl overflow-hidden shadow-lg mb-4">
                        <img id="detail-cover" src="" class="w-full h-full object-cover">
                    </div>
                    <button id="btn-read-first" class="w-full bg-sakura-dark text-white font-bold py-3 rounded-xl hover:opacity-90 transition-all flex items-center justify-center gap-2">
                        <i class="ph-fill ph-book-open"></i> ĐỌC TỪ ĐẦU
                    </button>
                </div>

                <div class="w-full md:w-2/3 lg:w-3/4">
                    <h2 id="detail-title" class="text-3xl md:text-4xl font-bold text-text-main mb-2 font-handwriting">Đang tải...</h2>
                    <p id="detail-author" class="text-sakura-dark font-medium text-lg mb-4"></p>
                    
                    <div class="flex items-center gap-6 mb-6 pb-6 border-b border-sakura-mid/30">
                        <div class="text-center">
                            <p class="text-text-muted text-sm uppercase mb-1">Trạng thái</p>
                            <p id="detail-status" class="font-bold text-text-main"></p>
                        </div>
                        <div class="text-center">
                            <p class="text-text-muted text-sm uppercase mb-1">Số chương</p>
                            <p id="detail-chapter-count" class="font-bold text-text-main"></p>
                        </div>
                    </div>

                    <div class="mb-8">
                        <h3 class="font-bold text-lg text-text-main mb-2">Giới thiệu:</h3>
                        <p id="detail-desc" class="text-text-muted leading-relaxed whitespace-pre-wrap"></p>
                    </div>

                    <div>
                        <h3 class="font-bold text-lg text-text-main mb-4 flex items-center gap-2 border-b border-sakura-mid/30 pb-2">
                            <i class="ph-fill ph-list-numbers text-sakura-dark"></i> Mục Lục Chương
                        </h3>
                        <div id="detail-toc" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-80 overflow-y-auto pr-2">
                            </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-read" class="hidden glass-panel rounded-3xl p-6 md:p-10 shadow-sm border border-white">
            <div class="flex items-center justify-between border-b border-sakura-mid/30 pb-4 mb-8">
                <button onclick="backToDetail()" class="flex items-center gap-2 text-sakura-dark font-medium bg-sakura-light/50 px-4 py-2 rounded-xl">
                    <i class="ph-bold ph-arrow-left"></i> Mục lục
                </button>
                <div class="text-right">
                    <h2 id="read-story-title" class="font-bold text-xl text-text-main line-clamp-1"></h2>
                </div>
            </div>

            <div class="text-center mb-8">
                <h3 id="read-chapter-title" class="font-handwriting text-3xl md:text-4xl font-bold text-sakura-dark"></h3>
            </div>

            <div id="read-content" class="reading-content text-text-main whitespace-pre-wrap">
                </div>

            <div class="flex items-center justify-between mt-12 pt-6 border-t border-sakura-mid/30">
                <button id="btn-prev-chap" onclick="changeChapter(-1)" class="flex items-center gap-2 px-5 py-3 rounded-xl bg-sakura-light text-sakura-dark font-medium hover:bg-sakura-mid/30 disabled:opacity-50">
                    <i class="ph-bold ph-caret-left"></i> Trước
                </button>
                <span id="chap-indicator" class="text-text-muted font-medium text-sm"></span>
                <button id="btn-next-chap" onclick="changeChapter(1)" class="flex items-center gap-2 px-5 py-3 rounded-xl bg-sakura-dark text-white font-medium disabled:opacity-50">
                    Sau <i class="ph-bold ph-caret-right"></i>
                </button>
            </div>
        </div>

    </main>

    <script>
        // Lấy ID truyện từ đường link URL (Ví dụ: truyen.html?id=123)
        const urlParams = new URLSearchParams(window.location.search);
        const storyId = urlParams.get('id');
        let currentStory = null;
        let currentChapterIndex = 0;

        window.onload = async () => {
            if (!storyId) {
                alert("Không tìm thấy mã truyện!");
                window.location.href = 'index.html';
                return;
            }

            try {
                // Gọi API lấy dữ liệu
                const response = await fetch('https://my-tale.onrender.com/api/stories');
                const stories = await response.json();
                currentStory = stories.find(s => s._id === storyId);

                if (!currentStory) {
                    alert("Truyện này không tồn tại hoặc đã bị xóa!");
                    window.location.href = 'index.html';
                    return;
                }

                renderDetail();
            } catch (error) {
                console.error(error);
                alert("Lỗi kết nối máy chủ!");
            }
        };

        function renderDetail() {
            document.getElementById('detail-cover').src = currentStory.image;
            document.getElementById('detail-title').innerText = currentStory.title;
            document.getElementById('detail-author').innerText = `Tác giả: ${currentStory.author}`;
            document.getElementById('detail-status').innerText = currentStory.status === 'hoan-thanh' ? 'Hoàn thành' : 'Đang ra';
            
            const chapterCount = currentStory.chaptersData ? currentStory.chaptersData.length : 0;
            document.getElementById('detail-chapter-count').innerText = chapterCount;
            document.getElementById('detail-desc').innerText = currentStory.desc || 'Chưa có lời giới thiệu.';

            const tocContainer = document.getElementById('detail-toc');
            if (chapterCount === 0) {
                tocContainer.innerHTML = '<p class="text-text-muted">Truyện chưa có chương nào.</p>';
                document.getElementById('btn-read-first').onclick = () => alert('Truyện chưa có nội dung!');
            } else {
                tocContainer.innerHTML = currentStory.chaptersData.map((chap, index) => `
                    <button onclick="startReading(${index})" class="text-left px-4 py-3 bg-sakura-light/50 hover:bg-sakura-light rounded-xl truncate flex items-center gap-2 text-sm text-text-main">
                        <span class="font-bold text-sakura-dark text-xs whitespace-nowrap">CH ${index + 1}</span> 
                        <span class="truncate">${chap.title}</span>
                    </button>
                `).join('');
                document.getElementById('btn-read-first').onclick = () => startReading(0);
            }
        }

        function startReading(index) {
            currentChapterIndex = index;
            document.getElementById('view-detail').classList.add('hidden');
            document.getElementById('view-read').classList.remove('hidden');
            document.getElementById('read-story-title').innerText = currentStory.title;
            
            renderChapter();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToDetail() {
            document.getElementById('view-read').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');
        }

        function renderChapter() {
            const chapter = currentStory.chaptersData[currentChapterIndex];
            document.getElementById('read-chapter-title').innerText = chapter.title;
            
            const contentDiv = document.getElementById('read-content');
            if (currentStory.format === 'truyen-chu') {
                contentDiv.innerHTML = chapter.content;
            } else {
                contentDiv.innerHTML = chapter.images.map(src => `<img src="${src}" loading="lazy" />`).join('');
            }

            document.getElementById('chap-indicator').innerText = `${currentChapterIndex + 1} / ${currentStory.chaptersData.length}`;
            document.getElementById('btn-prev-chap').disabled = (currentChapterIndex === 0);
            document.getElementById('btn-next-chap').disabled = (currentChapterIndex === currentStory.chaptersData.length - 1);
        }

        
        function changeChapter(step) {
            const newIndex = currentChapterIndex + step;
            if (newIndex >= 0 && newIndex < currentStory.chaptersData.length) {
                currentChapterIndex = newIndex;
                renderChapter();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
