<!doctype html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đọc Truyện - My Tale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              "sakura-light": "#FDF4F5",
              "sakura-mid": "#F4C7CC",
              "sakura-dark": "#E598A3",
              "text-main": "#5C4044",
              "text-muted": "#8A6E72",
              "night-bg": "#0f172a",
              "night-surface": "#1e293b",
              "night-border": "#334155",
              "night-text": "#e2e8f0",
              "night-text-muted": "#94a3b8",
              "night-accent": "#60a5fa"
            },
            fontFamily: {
              sans: ["Quicksand", "sans-serif"],
              handwriting: ["Dancing Script", "cursive"],
            }
          }
        }
      };
    </script>
    <style>
      body {
        font-family: 'Quicksand', sans-serif;
        background-color: #fdf4f5;
        color: #5c4044;
      }
      .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
      .reading-content p { margin-bottom: 1.5rem; text-indent: 1.5rem; font-size: 1.125rem; line-height: 1.8; }
      .reading-content img { border-radius: 0.5rem; margin-bottom: 1rem; width: 100%; height: auto; }
      /* Hiệu ứng Đĩa than xoay */
      @keyframes spin-disk { 100% { transform: rotate(360deg); } }
      .spinning { animation: spin-disk 4s linear infinite; }
      .paused { animation-play-state: paused; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <header class="max-w-5xl mx-auto w-full mb-6 flex justify-between items-center">
        <button onclick="window.location.href='index.html'" class="flex items-center gap-2 text-sakura-dark font-bold bg-white px-5 py-2.5 rounded-full shadow-sm border border-sakura-mid/30 hover:bg-sakura-light transition-colors">
            <i class="ph-bold ph-house"></i> Về Trang Chủ
        </button>
        <div class="font-handwriting text-3xl font-bold text-sakura-dark">My Tale</div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto w-full relative">
        
        <div id="view-detail" class="glass-panel rounded-3xl p-6 md:p-8 shadow-sm border border-white">
            <div class="flex flex-col md:flex-row gap-8">
                <div class="w-full md:w-1/3 lg:w-1/4 flex flex-col items-center">
                    <div class="w-48 md:w-full aspect-[3/4] rounded-2xl overflow-hidden shadow-lg mb-4">
                        <img id="detail-cover" src="" class="w-full h-full object-cover">
                    </div>
                    <button id="btn-read-first" class="w-full bg-sakura-dark text-white font-bold py-3 rounded-xl hover:opacity-90 transition-all flex items-center justify-center gap-2">
                        <i class="ph-fill ph-book-open"></i> ĐỌC TỪ ĐẦU
                    </button>
                    <div id="rating-container" class="mt-5 w-full bg-white/60 p-4 rounded-2xl shadow-sm border border-sakura-mid/40 text-center relative overflow-hidden group">
                        <div class="absolute inset-0 bg-gradient-to-tr from-sakura-light/50 to-transparent -z-10"></div>
                        <p class="text-xs text-text-muted font-bold mb-2 uppercase tracking-widest">Đánh giá tác phẩm</p>
                        
                        <div id="star-rating" class="flex items-center justify-center gap-1 cursor-pointer w-max mx-auto py-1">
                            <i class="ph-bold ph-spinner animate-spin text-sakura-dark"></i>
                        </div>
                        
                        <p class="text-xs text-text-muted mt-2 font-medium">
                            <span id="rating-score" class="font-bold text-sakura-dark text-lg">0.0</span>/5 
                            (<span id="rating-count">0</span> lượt)
                        </p>
                    </div>
                </div>

                <div class="w-full md:w-2/3 lg:w-3/4">
                    <h2 id="detail-title" class="text-3xl md:text-4xl font-bold text-text-main mb-2 font-handwriting">Đang tải...</h2>
                    <p id="detail-author" class="text-sakura-dark font-medium text-lg mb-4"></p>
                    
                    <div class="flex items-center gap-6 mb-6 pb-6 border-b border-sakura-mid/30">
                        <div class="text-center">
                            <p class="text-text-muted text-sm uppercase mb-1">Trạng thái</p>
                            <p id="detail-status" class="font-bold text-text-main"></p>
                        </div>
                        <div class="text-center">
                            <p class="text-text-muted text-sm uppercase mb-1">Số chương</p>
                            <p id="detail-chapter-count" class="font-bold text-text-main"></p>
                        </div>
                    </div>

                    <div class="mb-8">
                        <h3 class="font-bold text-lg text-text-main mb-2">Giới thiệu:</h3>
                        <p id="detail-desc" class="text-text-muted leading-relaxed whitespace-pre-wrap"></p>
                    </div>

                    <div>
                        <h3 class="font-bold text-lg text-text-main mb-4 flex items-center gap-2 border-b border-sakura-mid/30 pb-2">
                            <i class="ph-fill ph-list-numbers text-sakura-dark"></i> Mục Lục Chương
                        </h3>
                        <div id="detail-toc" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-80 overflow-y-auto pr-2">
                            </div>
                            <div id="detail-comments-container" class="mt-8 border-t border-sakura-mid/30 pt-6"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-read" class="hidden glass-panel rounded-3xl p-6 md:p-10 shadow-sm border border-white">
            <div class="flex items-center justify-between border-b border-sakura-mid/30 pb-4 mb-8">
                <button onclick="backToDetail()" class="flex items-center gap-2 text-sakura-dark font-medium bg-sakura-light/50 px-4 py-2 rounded-xl">
                    <i class="ph-bold ph-arrow-left"></i> Mục lục
                </button>
                <div class="text-right">
                    <h2 id="read-story-title" class="font-bold text-xl text-text-main line-clamp-1"></h2>
                </div>
            </div>

            <div class="text-center mb-8">
                <h3 id="read-chapter-title" class="font-handwriting text-3xl md:text-4xl font-bold text-sakura-dark"></h3>
            </div>

            <div id="read-content" class="reading-content text-text-main whitespace-pre-wrap">
                
            </div>
            <div id="read-poll-container" class="mt-10 hidden"></div>
            <div class="flex items-center justify-between mt-12 pt-6 border-t border-sakura-mid/30">
                <button id="btn-prev-chap" onclick="changeChapter(-1)" class="...">
                    <i class="ph-bold ph-caret-left"></i> Trước
                </button>
                <span id="chap-indicator" class="text-text-muted font-medium text-sm"></span>
                <button id="btn-next-chap" onclick="changeChapter(1)" class="...">
                    Sau <i class="ph-bold ph-caret-right"></i>
                </button>
            </div>
            
            <div id="read-comments-container" class="mt-8 border-t border-sakura-mid/30 pt-6"></div>
        </div>

    </main>

    <script>
        // Lấy ID truyện từ đường link URL (Ví dụ: truyen.html?id=123)
        const urlParams = new URLSearchParams(window.location.search);
        const storyId = urlParams.get('id');
        let currentStory = null;
        let currentChapterIndex = 0;
        // --- HỆ THỐNG LƯU LỊCH SỬ ĐỌC ---
        function getReadingHistory(id) {
            // Lấy cuốn sổ tay ra, nếu chưa có thì tạo sổ mới rỗng
            const history = JSON.parse(localStorage.getItem('mytales_reading_history') || '{}');
            return history[id]; // Trả về số thứ tự chương đã đọc (hoặc undefined nếu chưa đọc)
        }

        function saveReadingHistory(id, chapterIndex) {
            const history = JSON.parse(localStorage.getItem('mytales_reading_history') || '{}');
            history[id] = chapterIndex; // Ghi đè chương mới nhất vào sổ
            localStorage.setItem('mytales_reading_history', JSON.stringify(history)); // Cất sổ đi
        }
        window.onload = async () => {
            if (!storyId) {
                alert("Không tìm thấy mã truyện!");
                window.location.href = 'index.html';
                return;
            }

            try {
                // Gọi API lấy dữ liệu
                const response = await fetch('https://my-tale.onrender.com/api/stories');
                const stories = await response.json();
                currentStory = stories.find(s => s._id === storyId);

                if (!currentStory) {
                    alert("Truyện này không tồn tại hoặc đã bị xóa!");
                    window.location.href = 'index.html';
                    return;
                }
                fetchComments();
                renderDetail();
                loadRating(); 
                setupStarEvents();
                setInterval(loadRating, 5000);
            } catch (error) {
                console.error(error);
                alert("Lỗi kết nối máy chủ!");
            }
        };

        function renderDetail() {
            document.getElementById('detail-cover').src = currentStory.image;
            document.getElementById('detail-title').innerText = currentStory.title;
            document.getElementById('detail-author').innerText = `Tác giả: ${currentStory.author}`;
            document.getElementById('detail-status').innerText = currentStory.status === 'hoan-thanh' ? 'Hoàn thành' : 'Đang ra';
            
            const chapterCount = currentStory.chaptersData ? currentStory.chaptersData.length : 0;
            document.getElementById('detail-chapter-count').innerText = chapterCount;
            document.getElementById('detail-desc').innerText = currentStory.desc || 'Chưa có lời giới thiệu.';

            const tocContainer = document.getElementById('detail-toc');
            const btnRead = document.getElementById('btn-read-first');

            if (chapterCount === 0) {
                tocContainer.innerHTML = '<p class="text-text-muted">Truyện chưa có chương nào.</p>';
                btnRead.onclick = () => alert('Truyện chưa có nội dung!');
                btnRead.innerHTML = `<i class="ph-fill ph-book-open"></i> ĐỌC TỪ ĐẦU`;
            } else {
                // 1. Hiển thị Mục lục
                tocContainer.innerHTML = currentStory.chaptersData.map((chap, index) => `
                    <button onclick="startReading(${index})" class="text-left px-4 py-3 bg-sakura-light/50 hover:bg-sakura-light rounded-xl truncate flex items-center gap-2 text-sm text-text-main">
                        <span class="font-bold text-sakura-dark text-xs whitespace-nowrap">CH ${index + 1}</span> 
                        <span class="truncate">${chap.title}</span>
                    </button>
                `).join('');

                // 2. Kiểm tra lịch sử đọc để biến hình nút bấm
                const savedIndex = getReadingHistory(storyId);
                
                if (savedIndex !== undefined && savedIndex < chapterCount) {
                    // Nếu đã từng đọc -> Hiện nút ĐỌC TIẾP
                    btnRead.innerHTML = `<i class="ph-fill ph-bookmark-simple"></i> ĐỌC TIẾP CHƯƠNG ${savedIndex + 1}`;
                    btnRead.onclick = () => startReading(savedIndex);
                } else {
                    // Nếu chưa đọc bao giờ -> Hiện nút ĐỌC TỪ ĐẦU
                    btnRead.innerHTML = `<i class="ph-fill ph-book-open"></i> ĐỌC TỪ ĐẦU`;
                    btnRead.onclick = () => startReading(0);
                }
            }
        }

        function startReading(index) {
            currentChapterIndex = index;
            saveReadingHistory(storyId, currentChapterIndex);
            document.getElementById('view-detail').classList.add('hidden');
            document.getElementById('view-read').classList.remove('hidden');
            document.getElementById('read-story-title').innerText = currentStory.title;
            
            renderChapter();
            buildCommentUI('read-comments-container', currentChapterIndex);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToDetail() {
            document.getElementById('view-read').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');
        }

        function renderChapter() {
            const chapter = currentStory.chaptersData[currentChapterIndex];
            document.getElementById('read-chapter-title').innerText = chapter.title;
            
            const contentDiv = document.getElementById('read-content');
            if (currentStory.format === 'truyen-chu') {
                contentDiv.innerHTML = chapter.content;
            } else {
                contentDiv.innerHTML = chapter.images.map(src => `<img src="${src}" loading="lazy" />`).join('');
            }

            document.getElementById('chap-indicator').innerText = `${currentChapterIndex + 1} / ${currentStory.chaptersData.length}`;
            document.getElementById('btn-prev-chap').disabled = (currentChapterIndex === 0);
            document.getElementById('btn-next-chap').disabled = (currentChapterIndex === currentStory.chaptersData.length - 1);
            // Đặt đoạn này ở cuối hàm renderChapter()
            const pollContainer = document.getElementById('read-poll-container');
            if(chapter.hasPoll && chapter.pollData) {
                pollContainer.classList.remove('hidden');
                renderPollUI(chapter.pollData, chapter._id);
            } else {
                pollContainer.classList.add('hidden');
                pollContainer.innerHTML = '';
            }
        }

        function renderPollUI(pollData, chapterId) {
    const container = document.getElementById('read-poll-container');
    // Kiểm tra xem User đã vote bằng localstorage
    const hasVoted = localStorage.getItem(`voted_${chapterId}`); 
    const totalVotes = pollData.options.reduce((sum, opt) => sum + opt.votes, 0);

    let html = `
        <div class="bg-sakura-light/40 p-6 md:p-8 rounded-3xl border border-sakura-mid/40 shadow-sm max-w-2xl mx-auto">
            <h3 class="font-bold text-xl text-text-main mb-6 flex items-center justify-center gap-2 text-center">
                <i class="ph-fill ph-chart-bar text-sakura-dark text-2xl"></i> ${pollData.question}
            </h3>
            <div class="space-y-3">
    `;

    pollData.options.forEach((opt, index) => {
        if(hasVoted) {
            // ĐÃ VOTE: Chỉ hiển thị thanh kết quả
            const percent = totalVotes === 0 ? 0 : Math.round((opt.votes / totalVotes) * 100);
            html += `
                <div class="relative w-full bg-white rounded-xl h-12 overflow-hidden border border-sakura-mid/50 shadow-sm">
                    <div class="absolute top-0 left-0 h-full bg-sakura-mid/40 transition-all duration-1000 ease-out" style="width: ${percent}%"></div>
                    <div class="absolute inset-0 flex items-center justify-between px-5 text-sm font-bold text-text-main">
                        <span class="z-10">${opt.text}</span>
                        <span class="z-10 text-sakura-dark">${percent}%</span>
                    </div>
                </div>
            `;
        } else {
            // CHƯA VOTE: Hiển thị các nút bấm
            html += `
                <button onclick="submitVote('${chapterId}', ${index})" class="w-full text-left px-5 py-3.5 bg-white hover:bg-sakura-light hover:-translate-y-0.5 border border-sakura-mid/60 rounded-xl text-sm font-bold text-text-main transition-all shadow-sm hover:shadow-md">
                    ${opt.text}
                </button>
            `;
        }
    });

    html += `
            </div>
            ${hasVoted ? `<p class="text-center text-xs text-text-muted mt-4 mt-4 font-medium"><i class="ph-fill ph-check-circle text-green-500"></i> Bạn đã tham gia bình chọn</p>` : ''}
        </div>`;
    container.innerHTML = html;
}

        async function submitVote(chapterId, optionIndex) {
          try {
              // Dùng storyId thay cho currentReadingStoryId
              const response = await fetch(`https://my-tale.onrender.com/api/stories/${storyId}/chapters/${chapterId}/vote`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ optionIndex: optionIndex })
              });
              
              const data = await response.json(); 
              
              if(response.ok) {
                  localStorage.setItem(`voted_${chapterId}`, 'true');
                  
                  // Dùng thẳng biến currentStory đang lưu truyện hiện tại
                  currentStory.chaptersData[currentChapterIndex].pollData.options[optionIndex].votes += 1;
                  renderPollUI(currentStory.chaptersData[currentChapterIndex].pollData, chapterId);
              } else {
                  alert("❌ Lỗi: " + data.message);
              }
          } catch(error) {
              alert("Lỗi kết nối máy chủ! Vui lòng thử lại.");
          }
      }
        function changeChapter(step) {
            const newIndex = currentChapterIndex + step;
            if (newIndex >= 0 && newIndex < currentStory.chaptersData.length) {
                currentChapterIndex = newIndex;
                saveReadingHistory(storyId, currentChapterIndex);
                renderChapter();
                buildCommentUI('read-comments-container', currentChapterIndex)
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        // --- HỆ THỐNG BÌNH LUẬN ---
        
        // 1. Lấy mã định danh (Dùng chung với Góc Tâm Sự)
        let myUUID = localStorage.getItem('mytale_anon_uuid');
        if (!myUUID) {
            myUUID = 'anon_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('mytale_anon_uuid', myUUID);
        }

        let currentComments = [];

        // 2. Tải toàn bộ bình luận của truyện này
        async function fetchComments() {
            try {
                const response = await fetch(`https://my-tale.onrender.com/api/comments/${storyId}`);
                if (response.ok) {
                    currentComments = await response.json();
                    // Cập nhật lại khung bình luận tùy theo người dùng đang đứng ở đâu
                    if (!document.getElementById('view-detail').classList.contains('hidden')) {
                        buildCommentUI('detail-comments-container', -1);
                    } else {
                        buildCommentUI('read-comments-container', currentChapterIndex);
                    }
                }
            } catch (error) { console.error("Lỗi tải bình luận:", error); }
        }

        // 3. Xây dựng giao diện Khung bình luận
        function buildCommentUI(containerId, chapterContext) {
            const container = document.getElementById(containerId);
            if (!container) return;

            // ĐÃ SỬA: Nếu ở trang chi tiết (chapterContext === -1) thì lấy TOÀN BỘ bình luận
            // Nếu ở trong chương cụ thể (chapterContext >= 0) thì chỉ lấy bình luận của chương đó
            const filteredComments = chapterContext === -1 
                ? currentComments 
                : currentComments.filter(c => c.chapterIndex === chapterContext);
                
            const adminToken = localStorage.getItem('mytales_token');

            let html = `
                <h3 class="font-bold text-lg text-text-main mb-4 flex items-center gap-2">
                    <i class="ph-fill ph-chats-teardrop text-sakura-dark"></i> Bình luận (${filteredComments.length})
                </h3>
                
                <div class="flex gap-3 mb-6">
                    <div class="w-10 h-10 rounded-full bg-sakura-mid text-white flex items-center justify-center font-bold flex-shrink-0 text-xs shadow-inner">Bạn</div>
                    <div class="flex-grow flex flex-col gap-2 relative">
                        <textarea id="comment-input-${chapterContext}" rows="2" class="w-full px-4 py-3 rounded-2xl border border-sakura-mid focus:outline-none focus:border-sakura-dark focus:ring-2 focus:ring-sakura-light resize-none bg-white/70 transition-all text-text-main" placeholder="Nhập bình luận ẩn danh của bạn..."></textarea>
                        <button onclick="submitComment(${chapterContext})" class="self-end bg-sakura-dark text-white px-6 py-2 rounded-xl font-bold hover:bg-[#d48895] transition-colors shadow-sm flex items-center gap-2">
                            <i class="ph-bold ph-paper-plane-right"></i> Gửi
                        </button>
                    </div>
                </div>
                
                <div class="flex flex-col gap-4">
            `;

            if (filteredComments.length === 0) {
                html += `<p class="text-center text-text-muted text-sm italic py-4">Chưa có bình luận nào. Hãy là người đầu tiên!</p>`;
            } else {
                filteredComments.forEach(cmt => {
                    // Định dạng ngày giờ
                    const date = new Date(cmt.createdAt);
                    const timeStr = `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')} - ${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth()+1).padStart(2, '0')}`;
                    
                    const isMyComment = cmt.uuid === myUUID;
                    
                    // ĐÃ THÊM: Tạo nhãn "Chương X" nếu bình luận này thuộc về 1 chương VÀ người dùng đang xem ở trang chi tiết
                    let chapterTag = '';
                    if (chapterContext === -1 && cmt.chapterIndex >= 0) {
                        chapterTag = `<span class="bg-sakura-light border border-sakura-mid/30 text-sakura-dark px-2 py-0.5 rounded-md text-[10px] ml-2 font-bold whitespace-nowrap shadow-sm"><i class="ph-fill ph-book-open mr-1"></i>Chương ${cmt.chapterIndex + 1}</span>`;
                    }
                    
                    html += `
                        <div class="flex gap-3 group">
                            <div class="w-10 h-10 rounded-full ${isMyComment ? 'bg-sakura-dark' : 'bg-gray-200'} text-white flex items-center justify-center font-bold flex-shrink-0 text-xs overflow-hidden shadow-sm">
                                ${isMyComment ? 'Bạn' : '<i class="ph-fill ph-user text-gray-400 text-lg"></i>'}
                            </div>
                            <div class="flex-grow">
                                <div class="bg-white px-4 py-3 rounded-2xl rounded-tl-sm shadow-sm border border-sakura-mid/20 inline-block max-w-full">
                                    <div class="flex items-center gap-2 justify-between mb-1">
                                        <div class="flex items-center flex-wrap gap-1">
                                            <span class="font-bold text-sm ${isMyComment ? 'text-sakura-dark' : 'text-text-main'}">${cmt.uuid}</span>
                                            ${chapterTag}
                                        </div>
                                        ${adminToken ? `<button onclick="deleteComment('${cmt._id}')" class="text-rose-400 hover:text-rose-600 opacity-0 group-hover:opacity-100 transition-opacity" title="Xóa bình luận"><i class="ph-bold ph-trash"></i></button>` : ''}
                                    </div>
                                    <p class="text-text-main whitespace-pre-wrap break-words">${cmt.content}</p>
                                </div>
                                <div class="text-[10px] text-text-muted mt-1 ml-2">${timeStr}</div>
                            </div>
                        </div>
                    `;
                });
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        // 4. Gửi bình luận lên máy chủ
        async function submitComment(chapterContext) {
            const inputEl = document.getElementById(`comment-input-${chapterContext}`);
            const content = inputEl.value.trim();
            
            if (!content) return;
            
            inputEl.disabled = true;

            try {
                const response = await fetch('https://my-tale.onrender.com/api/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        storyId: storyId,
                        chapterIndex: chapterContext,
                        uuid: myUUID,
                        content: content
                    })
                });

                if (response.ok) {
                    inputEl.value = '';
                    fetchComments(); // Tải lại danh sách
                }
            } catch (error) {
                alert("Lỗi kết nối. Không thể gửi bình luận.");
            } finally {
                inputEl.disabled = false;
            }
        }

        // 5. Admin Xóa bình luận
        async function deleteComment(commentId) {
            if (!confirm('Bạn muốn xóa vĩnh viễn bình luận này?')) return;
            const adminToken = localStorage.getItem('mytales_token');
            try {
                await fetch(`https://my-tale.onrender.com/api/comments/${commentId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                fetchComments(); // Tải lại danh sách
            } catch (error) {
                alert('Lỗi xóa bình luận');
            }
        }
        // --- HỆ THỐNG TRÌNH PHÁT NHẠC (BẢN CHUẨN) ---
        
        // 1. Luôn luôn khai báo hàm toàn cục trước
        window.toggleMusic = function() {
            const audio = document.getElementById('bg-audio');
            if (!audio) return; // Không có nhạc thì đứng im
            
            const disk = document.getElementById('record-disk');
            const playBtnIcon = document.getElementById('icon-play-pause');
            
            if (audio.paused) {
                audio.play();
                if(disk) { disk.classList.add('spinning'); disk.classList.remove('paused'); }
                if(playBtnIcon) playBtnIcon.classList.replace('ph-play-circle', 'ph-pause-circle');
                localStorage.setItem('mytale_music_playing', 'true');
            } else {
                audio.pause();
                if(disk) disk.classList.add('paused');
                if(playBtnIcon) playBtnIcon.classList.replace('ph-pause-circle', 'ph-play-circle');
                localStorage.setItem('mytale_music_playing', 'false');
            }
        };

        // 2. Chờ trang web tải xong 100% mới khôi phục trí nhớ
        window.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-audio');
            if (!audio) return;

            const disk = document.getElementById('record-disk');
            const playBtnIcon = document.getElementById('icon-play-pause');
            const volumeSlider = document.getElementById('volume-slider');

            const savedTime = localStorage.getItem('mytale_music_time') || 0;
            const isPlaying = localStorage.getItem('mytale_music_playing') === 'true';
            const savedVolume = localStorage.getItem('mytale_music_volume') || 0.5;

            audio.volume = savedVolume;
            if (volumeSlider) volumeSlider.value = savedVolume;
            audio.currentTime = savedTime;

            if (isPlaying) {
                audio.play().then(() => {
                    if(disk) { disk.classList.add('spinning'); disk.classList.remove('paused'); }
                    if(playBtnIcon) playBtnIcon.classList.replace('ph-play-circle', 'ph-pause-circle');
                }).catch(() => {
                    // Nếu trình duyệt chặn tự động phát
                    if(disk) disk.classList.add('paused');
                    if(playBtnIcon) playBtnIcon.classList.replace('ph-pause-circle', 'ph-play-circle');
                    localStorage.setItem('mytale_music_playing', 'false');
                });
            }

            if (volumeSlider) {
                volumeSlider.addEventListener('input', (e) => {
                    audio.volume = e.target.value;
                    localStorage.setItem('mytale_music_volume', e.target.value);
                });
            }

            setInterval(() => {
                if (!audio.paused) {
                    localStorage.setItem('mytale_music_time', audio.currentTime);
                }
            }, 1000);
        });
        // --- HỆ THỐNG ĐÁNH GIÁ SAO ĐỘNG ---
        let currentRatingScore = 0;
        let isHoveringStars = false; // BỔ SUNG: Biến theo dõi xem có đang rê chuột không
        
        // Mượn danh tính ẩn danh để hệ thống biết ai đã đánh giá
        let myAnonUUID = localStorage.getItem('mytale_anon_uuid');
        if (!myAnonUUID) {
            myAnonUUID = 'anon_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('mytale_anon_uuid', myAnonUUID);
        }

        // Tải điểm từ Server
        async function loadRating() {
            try {
                const res = await fetch(`https://my-tale.onrender.com/api/stories/${storyId}/rating`);
                if (res.ok) {
                    const data = await res.json();
                    currentRatingScore = data.average;
                    document.getElementById('rating-score').innerText = data.average.toFixed(1);
                    document.getElementById('rating-count').innerText = data.count;
                    
                    // BỔ SUNG: Chỉ vẽ lại giao diện sao nếu chuột đang ở NGOÀI, 
                    // tránh làm giật hình khi người dùng đang vuốt để chọn mức sao
                    if (!isHoveringStars) {
                        updateStarsUI(data.average);
                    }
                }
            } catch (e) { console.error('Lỗi tải đánh giá'); }
        }

        // Vẽ sao ra màn hình
        function updateStarsUI(score) {
            const container = document.getElementById('star-rating');
            let html = '';
            for (let i = 1; i <= 5; i++) {
                if (score >= i) {
                    html += `<i class="ph-fill ph-star text-yellow-400 text-3xl drop-shadow-sm transition-transform hover:-translate-y-1"></i>`;
                } else if (score >= i - 0.5) {
                    html += `<i class="ph-fill ph-star-half text-yellow-400 text-3xl drop-shadow-sm transition-transform hover:-translate-y-1"></i>`;
                } else {
                    html += `<i class="ph ph-star text-yellow-400 text-3xl transition-transform hover:-translate-y-1 text-gray-300"></i>`;
                }
            }
            container.innerHTML = html;
        }

        // Thuật toán di chuột và bấm
        function setupStarEvents() {
            const starContainer = document.getElementById('star-rating');
            if(!starContainer) return;

            // BỔ SUNG: Đánh dấu đang di chuột VÀO vùng sao
            starContainer.addEventListener('mouseenter', () => {
                isHoveringStars = true;
            });

            // Khi rê chuột qua lại: Tính toán nửa sao dựa vào tọa độ con trỏ
            starContainer.addEventListener('mousemove', (e) => {
                const rect = starContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const percent = x / rect.width;
                // Thuật toán làm tròn đến 0.5 gần nhất
                let hoverScore = Math.ceil(percent * 10) / 2;
                if(hoverScore > 5) hoverScore = 5;
                if(hoverScore < 0.5) hoverScore = 0.5;
                updateStarsUI(hoverScore);
            });

            // Khi kéo chuột ra ngoài: Trả lại số sao thực tế
            starContainer.addEventListener('mouseleave', () => {
                isHoveringStars = false; // BỔ SUNG: Đánh dấu đã kéo chuột ra NGOÀI
                updateStarsUI(currentRatingScore);
            });

            // Khi kéo chuột ra ngoài: Trả lại số sao thực tế
            starContainer.addEventListener('mouseleave', () => {
                updateStarsUI(currentRatingScore);
            });

            // Khi bấm chuột: Chốt số điểm và gửi đi ngầm
            starContainer.addEventListener('click', async (e) => {
                const rect = starContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const percent = x / rect.width;
                let score = Math.ceil(percent * 10) / 2;
                if(score > 5) score = 5;
                if(score < 0.5) score = 0.5;
                
                try {
                    // Cập nhật giao diện tạm thời cho mượt
                    updateStarsUI(score);
                    
                    // Bắn dữ liệu ngầm xuống máy chủ
                    const res = await fetch(`https://my-tale.onrender.com/api/stories/${storyId}/rating`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ uuid: myAnonUUID, score: score })
                    });
                    
                    if(res.ok) {
                        const data = await res.json();
                        currentRatingScore = data.average;
                        document.getElementById('rating-score').innerText = data.average.toFixed(1);
                        document.getElementById('rating-count').innerText = data.count;
                        updateStarsUI(data.average);
                        
                        // Hiệu ứng phình to ăn mừng chốt vote thành công
                        starContainer.classList.add('scale-110');
                        setTimeout(() => starContainer.classList.remove('scale-110'), 200);
                    }
                } catch (err) {
                    alert("Lỗi mạng! Đánh giá chưa được ghi nhận.");
                    updateStarsUI(currentRatingScore);
                }
            });
        }
    </script>
    <div id="music-player" class="fixed bottom-6 left-6 z-50 glass-panel border border-sakura-mid/50 shadow-sakura rounded-full p-2 flex items-center gap-3 transition-all hover:pr-4 group max-w-[200px] md:max-w-[250px]">
        
        <div class="relative w-12 h-12 flex-shrink-0 cursor-pointer" onclick="toggleMusic()">
            <img id="record-disk" src="AVT/dia_nhac.jpg" alt="Vinyl" class="w-full h-full rounded-full object-cover shadow-sm transition-transform">
            <div class="absolute inset-0 rounded-full border-2 border-sakura-dark/30 flex items-center justify-center">
                <div class="w-3 h-3 bg-white rounded-full shadow-inner"></div>
            </div>
        </div>

        <div class="hidden md:flex group-hover:flex flex-col gap-1 w-full overflow-hidden transition-all">
            <div class="flex items-center justify-between gap-2">
                <button onclick="toggleMusic()" class="text-sakura-dark hover:text-rose-500 transition-colors">
                    <i id="icon-play-pause" class="ph-fill ph-play-circle text-2xl"></i>
                </button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" class="w-16 h-1.5 bg-sakura-mid rounded-lg appearance-none cursor-pointer accent-sakura-dark">
            </div>
            <p class="text-[10px] text-text-muted font-bold truncate">🎵 Giai điệu Thanh Xuân</p>
        </div>
    </div>

    <audio id="bg-audio" loop src="music/hope1.mp3"></audio>
</body>
</html>
