<!doctype html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Góc Tâm Sự - My Tale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "sakura-light": "#FDF4F5",
              "sakura-mid": "#F4C7CC",
              "sakura-dark": "#E598A3",
              "text-main": "#5C4044",
              "text-muted": "#8A6E72",
            },
            fontFamily: {
              sans: ["Quicksand", "sans-serif"],
              handwriting: ["Dancing Script", "cursive"],
            }
          }
        }
      };
    </script>
    <style>
      body {
        font-family: 'Quicksand', sans-serif;
        background-color: #fdf4f5;
        background-image: radial-gradient(#f4c7cc 0.5px, transparent 0.5px);
        background-size: 24px 24px;
        color: #5c4044;
      }
      .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
      
      /* Tùy chỉnh thanh cuộn cho khu vực chat */
      #chat-box::-webkit-scrollbar { width: 6px; }
      #chat-box::-webkit-scrollbar-track { background: transparent; }
      #chat-box::-webkit-scrollbar-thumb { background: #f4c7cc; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 md:p-8 overflow-hidden">

    <header class="max-w-4xl mx-auto w-full mb-4 flex justify-between items-center flex-shrink-0">
        <button onclick="window.location.href='index.html'" class="flex items-center gap-2 text-sakura-dark font-bold bg-white px-4 py-2 rounded-full shadow-sm border border-sakura-mid/30 hover:bg-sakura-light transition-colors">
            <i class="ph-bold ph-house"></i> Về Trang Chủ
        </button>
        <div class="font-handwriting text-3xl font-bold text-sakura-dark">Góc Tâm Sự</div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto w-full relative flex flex-col glass-panel rounded-3xl shadow-sm border border-white overflow-hidden">
        
        <div class="px-6 py-4 bg-white/50 border-b border-sakura-mid/30 flex justify-between items-center z-10 flex-shrink-0">
            <div>
                <h2 class="font-bold text-lg text-text-main flex items-center gap-2">
                    <i class="ph-fill ph-chats-teardrop text-sakura-dark"></i> Trò chuyện Ẩn danh
                </h2>
                <p class="text-xs text-text-muted mt-1">Môi trường văn minh, an toàn. Các từ ngữ vi phạm sẽ bị cấm vĩnh viễn.</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-text-muted">Định danh của bạn:</p>
                <p id="my-uuid-display" class="font-mono font-bold text-sakura-dark bg-sakura-light px-2 py-1 rounded-lg mt-1 text-xs"></p>
            </div>
        </div>

        <div id="chat-box" class="flex-grow p-6 overflow-y-auto flex flex-col gap-4">
            </div>

        <div id="reply-bar" class="hidden bg-sakura-light/80 px-6 py-2 border-t border-sakura-mid/30 flex justify-between items-center text-sm flex-shrink-0">
            <div class="flex items-center gap-2 text-text-main">
                <i class="ph-bold ph-arrow-u-down-left text-sakura-dark"></i>
                <span>Đang trả lời: <span id="reply-target-text" class="font-bold italic"></span></span>
            </div>
            <button onclick="cancelReply()" class="text-text-muted hover:text-rose-500 transition-colors">
                <i class="ph-bold ph-x-circle text-lg"></i>
            </button>
        </div>

        <div class="p-4 bg-white/80 border-t border-sakura-mid/30 flex gap-3 z-10 flex-shrink-0">
            <input type="text" id="chat-input" placeholder="Viết một thông điệp yêu thương..." 
                   class="flex-grow px-5 py-3 rounded-2xl border border-sakura-mid focus:outline-none focus:border-sakura-dark focus:ring-2 focus:ring-sakura-light text-text-main bg-white transition-all">
            <button onclick="sendMockMessage()" class="bg-sakura-dark hover:bg-[#d48895] text-white px-6 py-3 rounded-2xl font-bold transition-colors shadow-sm flex items-center gap-2">
                <i class="ph-fill ph-paper-plane-right text-xl"></i> <span class="hidden sm:inline">Gửi</span>
            </button>
        </div>
    </main>

    <script>
        // --- 1. THUẬT TOÁN ĐỊNH DANH ẨN DANH ---
        let myUUID = localStorage.getItem('mytale_anon_uuid');
        
        if (!myUUID) {
            // Nếu chưa có, tự động tạo một mã ngẫu nhiên (Ví dụ: anon_xyz123)
            myUUID = 'anon_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('mytale_anon_uuid', myUUID);
        }
        
        // Hiển thị mã lên góc phải màn hình
        document.getElementById('my-uuid-display').innerText = myUUID;

        // --- 2. BIẾN TRẠNG THÁI ---
        let replyingToId = null; 
        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');
        const replyBar = document.getElementById('reply-bar');
        const replyTargetText = document.getElementById('reply-target-text');

        // Bắt sự kiện ấn phím Enter để gửi
        chatInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMockMessage();
            }
        });

        // --- 3. HÀM CHỨC NĂNG GIAO DIỆN ---
        
        // Bấm nút Trả lời tin nhắn
        function prepareReply(messageId, shortText) {
            replyingToId = messageId;
            replyTargetText.innerText = `"${shortText}..."`;
            replyBar.classList.remove('hidden');
            chatInput.focus();
        }

        // Hủy bỏ trạng thái Trả lời
        function cancelReply() {
            replyingToId = null;
            replyBar.classList.add('hidden');
        }

        // Cuộn xuống cuối cùng của khung chat
        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Hàm render một tin nhắn ra màn hình (Giao diện bong bóng chat)
        function renderSingleMessage(msg) {
            const isMe = msg.uuid === myUUID; // Kiểm tra xem đây có phải tin nhắn của mình không
            
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-full`;
            
            // Xử lý khối trích dẫn (Nếu có reply)
            let replyHTML = '';
            if (msg.replyToText) {
                replyHTML = `
                    <div class="text-xs mb-1 bg-white/50 px-3 py-1.5 rounded-lg border-l-2 border-sakura-dark text-text-muted opacity-80 italic line-clamp-1 max-w-[80%]">
                        <i class="ph-bold ph-arrow-u-down-left mr-1"></i> ${msg.replyToText}
                    </div>
                `;
            }

            // Thiết kế bong bóng chat (Màu đậm cho mình, màu nhạt cho người khác)
            const bubbleClasses = isMe 
                ? 'bg-sakura-dark text-white rounded-2xl rounded-tr-sm px-4 py-2.5 shadow-sm' 
                : 'bg-white border border-sakura-mid/30 text-text-main rounded-2xl rounded-tl-sm px-4 py-2.5 shadow-sm';

            wrapper.innerHTML = `
                <span class="text-[10px] text-text-muted mb-1 px-1">${isMe ? 'Bạn' : msg.uuid}</span>
                ${replyHTML}
                <div class="flex gap-2 items-end group">
                    ${isMe ? `<button onclick="prepareReply('${msg.id}', '${msg.content.substring(0, 15)}')" class="opacity-0 group-hover:opacity-100 transition-opacity text-text-muted hover:text-sakura-dark text-lg p-1"><i class="ph-bold ph-arrow-u-down-left"></i></button>` : ''}
                    
                    <div class="${bubbleClasses} max-w-[85vw] md:max-w-md break-words">
                        ${msg.content}
                    </div>

                    ${!isMe ? `<button onclick="prepareReply('${msg.id}', '${msg.content.substring(0, 15)}')" class="opacity-0 group-hover:opacity-100 transition-opacity text-text-muted hover:text-sakura-dark text-lg p-1"><i class="ph-bold ph-arrow-u-down-left"></i></button>` : ''}
                </div>
            `;
            
            chatBox.appendChild(wrapper);
            scrollToBottom();
        }

        // --- 4. HÀM MÔ PHỎNG (Sẽ thay bằng API Backend ở bài sau) ---
        function sendMockMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            // Mô phỏng tạo cục dữ liệu gửi đi
            const newMessage = {
                id: 'msg_' + Date.now(),
                uuid: myUUID,
                content: text,
                replyToId: replyingToId,
                replyToText: replyingToId ? replyTargetText.innerText.replace(/"/g, '') : null // Lấy lại text đang reply
            };

            // In ngay ra màn hình
            renderSingleMessage(newMessage);
            
            // Dọn dẹp
            chatInput.value = '';
            cancelReply();
        }

        // Tạo vài tin nhắn mẫu ban đầu cho sinh động
        window.onload = () => {
            renderSingleMessage({ id: '1', uuid: 'anon_bot01', content: 'Chào mừng các bạn đến với Góc Tâm Sự!' });
            renderSingleMessage({ id: '2', uuid: 'anon_bot02', content: 'Ở đây mọi người được xưng hô thoải mái nhé, nhưng hãy lịch sự nha.' });
        }
    </script>
</body>
</html>
