<!doctype html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Góc Tâm Sự - My Tale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Nút mở Admin Dashboard (Sẽ được JS tự động hiện/ẩn dựa vào thẻ Admin) -->
        <button id="btn-admin-dashboard" onclick="openAdminPanel()" class="hidden fixed bottom-28 left-6 bg-purple-600 text-white px-4 py-2 rounded-xl shadow-lg hover:bg-purple-700 transition-all z-40 flex items-center gap-2">
            <i class="ph-bold ph-shield-check text-xl"></i> Quản Trị
        </button>

        <!-- Khung Admin Dashboard (Modal) -->
        <div id="admin-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[80vh] flex flex-col overflow-hidden shadow-2xl">
                <div class="p-6 border-b border-gray-200 flex justify-between items-center bg-purple-50">
                    <h2 class="text-xl font-bold text-purple-800 flex items-center gap-2"><i class="ph-fill ph-warning-octagon"></i> Xử lý Tố Cáo</h2>
                    <button onclick="closeAdminPanel()" class="text-gray-500 hover:text-rose-500 text-2xl"><i class="ph-bold ph-x"></i></button>
                </div>
                <div id="admin-reports-list" class="p-6 overflow-y-auto flex-grow space-y-4">
                    <!-- JS sẽ đổ danh sách tố cáo vào đây -->
                </div>
                <div class="p-6 border-t border-gray-200 bg-gray-50 flex flex-col gap-4">
                <div class="flex gap-2">
                    <input type="text" id="manual-ban-input" placeholder="Nhập Định danh (UUID hoặc IP) để KHÓA..." class="flex-grow px-4 py-2 border border-rose-300 rounded-lg focus:outline-none focus:border-rose-500">
                    <button onclick="manualBan()" class="bg-rose-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-rose-600 whitespace-nowrap">Khóa Cứng</button>
                </div>
                
                <div class="flex gap-2">
                    <input type="text" id="unban-input" placeholder="Nhập IP hoặc UUID để Gỡ cấm..." class="flex-grow px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
                    <button onclick="manualUnban()" class="bg-green-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-green-600 whitespace-nowrap">Ân Xá</button>
                </div>
                </div>
            </div>
        </div>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "sakura-light": "#FDF4F5",
              "sakura-mid": "#F4C7CC",
              "sakura-dark": "#E598A3",
              "text-main": "#5C4044",
              "text-muted": "#8A6E72",
            },
            fontFamily: {
              sans: ["Quicksand", "sans-serif"],
              handwriting: ["Dancing Script", "cursive"],
            }
          }
        }
      };
    </script>
    <style>
      body {
        font-family: 'Quicksand', sans-serif;
        background-color: #fdf4f5;
        background-image: radial-gradient(#f4c7cc 0.5px, transparent 0.5px);
        background-size: 24px 24px;
        color: #5c4044;
      }
      .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
      
      /* Tùy chỉnh thanh cuộn cho khu vực chat */
      #chat-box::-webkit-scrollbar { width: 6px; }
      #chat-box::-webkit-scrollbar-track { background: transparent; }
      #chat-box::-webkit-scrollbar-thumb { background: #f4c7cc; border-radius: 10px; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col sm:p-4 md:p-8 overflow-hidden bg-sakura-light">

    <header class="max-w-4xl mx-auto w-full p-3 sm:p-0 sm:mb-4 flex justify-between items-center flex-shrink-0 bg-white/80 sm:bg-transparent shadow-sm sm:shadow-none z-20">
        <!-- Gom 2 nút vào một nhóm -->
        <div class="flex items-center gap-2">
            <button onclick="window.location.href='index.html'" class="flex items-center gap-1 sm:gap-2 text-sakura-dark font-bold bg-white px-3 sm:px-4 py-2 rounded-full shadow-sm border border-sakura-mid/30 hover:bg-sakura-light transition-colors text-sm sm:text-base">
                <i class="ph-bold ph-house"></i> <span class="hidden sm:inline">Trang Chủ</span>
            </button>
            
            <!-- Nút Trạm QTV ẩn -->
            <button id="btn-back-qtv" onclick="window.location.href='qtv.html'" class="hidden items-center gap-1 sm:gap-2 text-blue-600 font-bold bg-blue-50 px-3 sm:px-4 py-2 rounded-full shadow-sm border border-blue-200 hover:bg-blue-100 transition-colors text-sm sm:text-base">
                <i class="ph-bold ph-shield-star"></i> Trạm QTV
            </button>
        </div>

        <div class="font-handwriting text-2xl sm:text-3xl font-bold text-sakura-dark">Góc Tâm Sự</div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto w-full relative flex flex-col glass-panel sm:rounded-3xl shadow-sm border-0 sm:border border-white overflow-hidden">
        
        <div class="px-6 py-4 bg-white/50 border-b border-sakura-mid/30 flex justify-between items-center z-10 flex-shrink-0">
            <div>
                <h2 class="font-bold text-lg text-text-main flex items-center gap-2">
                    <i class="ph-fill ph-chats-teardrop text-sakura-dark"></i> Trò chuyện Ẩn danh
                </h2>
                <p class="text-xs text-text-muted mt-1">Môi trường văn minh, an toàn. Các từ ngữ vi phạm sẽ bị cấm vĩnh viễn.</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-text-muted">Định danh của bạn:</p>
                <p id="my-uuid-display" class="font-mono font-bold text-sakura-dark bg-sakura-light px-2 py-1 rounded-lg mt-1 text-xs"></p>
            </div>
        </div>
        <div id="pinned-message-container" class="hidden px-6 py-3 bg-purple-900/10 border-b border-purple-500/30 flex justify-between items-center shadow-[0_0_15px_rgba(168,85,247,0.15)] z-20 flex-shrink-0 transition-all">
            <div class="flex items-center gap-3">
                <i class="ph-fill ph-push-pin text-purple-600 text-xl animate-pulse drop-shadow-[0_0_8px_rgba(168,85,247,0.6)]"></i>
                <div>
                    <p class="text-[10px] text-purple-600 font-bold uppercase tracking-widest">Thông báo từ Quản trị viên</p>
                    <p id="pinned-text" class="text-text-main text-sm font-semibold line-clamp-2"></p>
                </div>
            </div>
            <button id="btn-unpin" class="hidden text-text-muted hover:text-purple-600 transition-colors ml-4 p-2">
                <i class="ph-bold ph-x-circle text-lg"></i>
            </button>
        </div>
        <div id="chat-box" class="flex-grow p-6 overflow-y-auto flex flex-col gap-4">
            </div>
            <button id="scroll-bottom-btn" onclick="scrollToBottom()" class="hidden absolute bottom-24 right-8 bg-sakura-dark/90 text-white p-3 rounded-full shadow-lg hover:bg-sakura-dark transition-all z-20 backdrop-blur-sm animate-bounce">
            <i class="ph-bold ph-arrow-down text-xl"></i>
        </button>

        <div id="toast-notification" class="fixed top-20 right-4 transform translate-x-full transition-transform duration-300 bg-white border border-sakura-dark shadow-sakura rounded-xl p-4 flex items-center gap-3 z-50">
            <i class="ph-fill ph-bell-ringing text-sakura-dark text-2xl animate-wiggle"></i>
            <div>
                <p class="text-sm font-bold text-text-main">Có người vừa nhắc đến bạn!</p>
                <p class="text-xs text-text-muted">Kiểm tra tin nhắn mới nhất nhé.</p>
            </div>
        </div>
        <div id="reply-bar" class="hidden bg-sakura-light/80 px-6 py-2 border-t border-sakura-mid/30 flex justify-between items-center text-sm flex-shrink-0">
            <div class="flex items-center gap-2 text-text-main">
                <i class="ph-bold ph-arrow-u-down-left text-sakura-dark"></i>
                <span>Đang trả lời: <span id="reply-target-text" class="font-bold italic"></span></span>
            </div>
            <button onclick="cancelReply()" class="text-text-muted hover:text-rose-500 transition-colors">
                <i class="ph-bold ph-x-circle text-lg"></i>
            </button>
        </div>

        <div class="p-3 sm:p-4 bg-white/95 sm:bg-white/80 border-t border-sakura-mid/30 flex gap-2 sm:gap-3 z-10 flex-shrink-0">
            <input type="text" id="chat-input" placeholder="Viết một thông điệp yêu thương..." 
                   class="flex-grow px-5 py-3 rounded-2xl border border-sakura-mid focus:outline-none focus:border-sakura-dark focus:ring-2 focus:ring-sakura-light text-text-main bg-white transition-all">
            <button onclick="sendMockMessage()" class="bg-sakura-dark hover:bg-[#d48895] text-white px-6 py-3 rounded-2xl font-bold transition-colors shadow-sm flex items-center gap-2">
                <i class="ph-fill ph-paper-plane-right text-xl"></i> <span class="hidden sm:inline">Gửi</span>
            </button>
        </div>
    </main>
    
    <script>
        let lastMessagesSnapshot = "";
        // --- 1. THUẬT TOÁN ĐỊNH DANH & CẤP QUYỀN QTV ---
        let myUUID = '';
        
        // Kiểm tra xem có đang đăng nhập thẻ QTV không
        const qtvName = localStorage.getItem('mytales_qtv_name');
        const qtvToken = localStorage.getItem('mytales_qtv_token');
        
        if (qtvName && qtvToken) {
            // Nếu là QTV, ép tên hiển thị là tên QTV (VD: QTV1)
            myUUID = `<span class="text-blue-600 font-black tracking-widest px-1 bg-blue-100 rounded border border-blue-300">🛡️ ${qtvName}</span>`;
            
            // --- BỔ SUNG: HIỆN NÚT TRẠM QTV ---
            const btnBackQTV = document.getElementById('btn-back-qtv');
            if(btnBackQTV) {
                btnBackQTV.classList.remove('hidden');
                btnBackQTV.classList.add('flex');
            }
            // ---------------------------------

            // Cấp chìa khóa cho phép QTV mở bảng Admin để xóa/ban
            if (!localStorage.getItem('mytales_token')) {
                // Mượn tạm token QTV đưa vào kho token Admin để mở khóa các nút giao diện
                localStorage.setItem('mytales_token', qtvToken); 
            }
        } else {
            // Dân thường thì tự bốc thăm số ẩn danh
            myUUID = localStorage.getItem('mytale_anon_uuid');
            if (!myUUID) {
                myUUID = 'anon_' + Math.random().toString(36).substr(2, 6);
                localStorage.setItem('mytale_anon_uuid', myUUID);
            }
        }
        
        // Loại bỏ thẻ HTML (nếu có) khi truyền ID lên server
        const plainUUID = qtvName || myUUID; 
        document.getElementById('my-uuid-display').innerHTML = myUUID;

        // --- 2. BIẾN TRẠNG THÁI ---
        let replyingToId = null; 
        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');
        const replyBar = document.getElementById('reply-bar');
        const replyTargetText = document.getElementById('reply-target-text');

        // Bắt sự kiện ấn phím Enter để gửi
        chatInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMockMessage();
            }
        });

        // --- 3. HÀM CHỨC NĂNG GIAO DIỆN ---
        
        // Bấm nút Trả lời tin nhắn
        function prepareReply(messageId, shortText) {
            replyingToId = messageId;
            replyTargetText.innerText = `"${shortText}..."`;
            replyBar.classList.remove('hidden');
            chatInput.focus();
        }

        // Hủy bỏ trạng thái Trả lời
        function cancelReply() {
            replyingToId = null;
            replyBar.classList.add('hidden');
        }

        // Cuộn xuống cuối cùng của khung chat
        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        // Hàm biến đổi mốc thời gian ISO từ server thành dạng: Giờ:Phút - Ngày/Tháng/Năm
        function formatMessageTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            
            return `${hours}:${minutes} - ${day}/${month}/${year}`;
        }
        // Hàm render một tin nhắn ra màn hình (Giao diện bong bóng chat)
        function renderSingleMessage(msg) {
            const isMe = msg.uuid === plainUUID; 
            const adminToken = localStorage.getItem('mytales_token');
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-full mb-2`; // Thêm mb-2 để chừa chỗ cho tim
            wrapper.id = `message-bubble-${msg.id}`;
            
            let displayContent = msg.content;
            let isTagged = false;
            const tagPattern = '@' + myUUID;
            if (displayContent.includes(tagPattern)) {
                isTagged = true;
                displayContent = displayContent.replace(new RegExp(tagPattern, 'g'), `<span class="bg-purple-500 text-white px-1.5 py-0.5 rounded-md font-bold animate-pulse shadow-[0_0_8px_rgba(168,85,247,0.6)]">${tagPattern}</span>`);
            }

            if (isTagged && !isMe) {
                const messageTime = new Date(msg.createdAt).getTime();
                if (messageTime > Date.now() - 10000) showToastNotification();
            }

            let replyHTML = '';
            if (msg.replyToText) {
                replyHTML = `<div class="text-xs mb-1 bg-white/50 px-3 py-1.5 rounded-lg border-l-2 border-sakura-dark text-text-muted opacity-80 italic line-clamp-1 max-w-[80%]"><i class="ph-bold ph-arrow-u-down-left mr-1"></i> ${msg.replyToText}</div>`;
            }

            // --- THUẬT TOÁN ĐẾM VÀ HIỂN THỊ CẢM XÚC ---
            let reactionsDisplayHTML = '';
            if (msg.reactions) {
                const emojiMap = { like: '👍', heart: '❤️', haha: '😂', wow: '😲', cry: '😭', sad: '😢', angry: '😡' };
                let total = 0; let emojis = [];
                Object.keys(emojiMap).forEach(key => {
                    if (msg.reactions[key] && msg.reactions[key].length > 0) {
                        total += msg.reactions[key].length;
                        emojis.push(emojiMap[key]);
                    }
                });
                if (total > 0) {
                    reactionsDisplayHTML = `
                        <div class="absolute -bottom-3 ${isMe ? 'right-4' : 'left-4'} bg-white border border-sakura-mid rounded-full px-1.5 py-0.5 text-[10px] shadow-sm flex items-center gap-1 z-10">
                            <span>${emojis.slice(0, 3).join('')}</span>
                            <span class="text-text-muted font-bold">${total}</span>
                        </div>
                    `;
                }
            }

            const bubbleClasses = isMe 
                ? 'bg-sakura-dark text-white rounded-2xl rounded-tr-sm px-4 py-2.5 shadow-sm relative' 
                : 'bg-white border border-sakura-mid/30 text-text-main rounded-2xl rounded-tl-sm px-4 py-2.5 shadow-sm relative';

            // --- GIAO DIỆN CÔNG CỤ (FIX LỖI MOBILE BẰNG CÁCH THÊM sm:opacity-0) ---
            const btnClass = "opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity text-text-muted text-lg p-1 hover:text-sakura-dark";
            
            // --- GIAO DIỆN CÔNG CỤ (NÚT 3 CHẤM) ---
            const menuBtnClass = "flex items-center gap-2 w-full px-4 py-2.5 text-sm text-left hover:bg-sakura-light transition-colors font-medium";
            
            // Các nút mặc định
            let menuItems = `
                <button onclick="toggleReactPicker(event, '${msg.id}')" class="${menuBtnClass} text-yellow-600"><i class="ph-bold ph-smiley text-lg"></i> Cảm xúc</button>
                <button onclick="prepareReply('${msg.id}', '${msg.content.substring(0, 15).replace(/'/g, "\\'")}')" class="${menuBtnClass} text-blue-600"><i class="ph-bold ph-arrow-u-down-left text-lg"></i> Trả lời</button>
            `;
            
            // Các nút uy quyền (Dành cho QTV/Admin)
            if (adminToken) menuItems += `<button onclick="pinMessage('${msg.id}')" class="${menuBtnClass} text-purple-600"><i class="ph-bold ph-push-pin text-lg"></i> Ghim thông báo</button>`;
            if (adminToken) menuItems += `<button onclick="directBan('${msg.uuid}')" class="${menuBtnClass} text-rose-700"><i class="ph-bold ph-prohibit text-lg"></i> Khóa người dùng</button>`;
            if (isMe || adminToken) menuItems += `<button onclick="deleteMessage('${msg.id}')" class="${menuBtnClass} text-rose-500"><i class="ph-bold ph-trash text-lg"></i> Xóa tin nhắn</button>`;
            if (!isMe) menuItems += `<button onclick="reportMessage('${msg.id}', '${msg.uuid}', '${msg.content.replace(/'/g, "\\'")}')" class="${menuBtnClass} text-orange-500"><i class="ph-bold ph-flag text-lg"></i> Tố cáo</button>`;

            // Gom tất cả vào nút 3 chấm
            let toolButtons = `
            <div class="relative option-dropdown-container">
                <button onclick="toggleOptionsMenu(event, '${msg.id}')" class="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity text-text-muted text-2xl p-1 hover:text-sakura-dark" title="Tùy chọn">
                    <i class="ph-bold ph-dots-three-vertical"></i>
                </button>
                
                <div id="options-menu-${msg.id}" class="hidden absolute z-40 ${isMe ? 'right-0' : 'left-0'} top-8 w-44 bg-white border border-sakura-mid/50 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] overflow-hidden py-1 transform transition-all origin-top">
                    ${menuItems}
                </div>
                
                <div id="react-picker-${msg.id}" class="hidden absolute z-50 -top-12 ${isMe ? 'right-0' : 'left-0'} bg-white shadow-lg border border-sakura-mid/50 rounded-full px-2 py-1 flex gap-2 text-xl">
                    ${['like:👍', 'heart:❤️', 'haha:😂', 'wow:😲', 'cry:😭', 'sad:😢', 'angry:😡'].map(e => `<button onclick="submitReaction('${msg.id}', '${e.split(':')[0]}')" class="hover:scale-125 hover:-translate-y-1 transition-transform p-1">${e.split(':')[1]}</button>`).join('')}
                </div>
            </div>`;
            // Lấy chuỗi ngày tháng giờ đã được định dạng
            const timeHTML = `<div class="text-[9px] mt-1 text-right ${isMe ? 'text-white/70' : 'text-text-muted/70'}">${formatMessageTime(msg.createdAt)}</div>`;

            wrapper.innerHTML = `
                <span class="text-[10px] text-text-muted mb-1 px-1">${isMe ? 'Bạn' : msg.uuid}</span>
                ${replyHTML}
                <div class="flex gap-2 items-end group">
                    ${isMe ? toolButtons : ''}
                    <div class="${bubbleClasses} max-w-[85vw] md:max-w-md break-words">
                        ${displayContent}
                        ${timeHTML}
                        ${reactionsDisplayHTML}
                    </div>
                    ${!isMe ? toolButtons : ''}
                </div>
            `;
            chatBox.appendChild(wrapper);
        }

        // --- 4. KẾT NỐI API BACKEND ---
        const API_URL = 'https://my-tale.onrender.com/api/messages';
        let isBanned = false;
        let lastMessageCount = 0; // Biến nhớ số lượng tin nhắn hiện tại

        // Nút gửi trên giao diện sẽ gọi hàm này thay vì hàm mô phỏng
        document.querySelector('button[onclick="sendMockMessage()"]').setAttribute('onclick', 'sendMessage()');

        // Thay đổi sự kiện Enter để gọi hàm thật
        chatInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Hàm tải tin nhắn từ máy chủ (Hỏi thăm liên tục)
        fetchMessages
        async function fetchMessages() {
            if (isBanned) return; 
            try {
                const response = await fetch(API_URL);
                if (response.ok) {
                    const messages = await response.json();
                    
                    // 1. Xử lý hiển thị Tin nhắn Ghim
                    const pinnedMsg = messages.find(m => m.isPinned);
                    const adminToken = localStorage.getItem('mytales_token');
                    
                    if (pinnedMsg) {
                        const pinContainer = document.getElementById('pinned-message-container');
                        pinContainer.classList.remove('hidden');
                        pinContainer.classList.add('cursor-pointer');
                        pinContainer.onclick = (e) => {
                            if (e.target.closest('#btn-unpin')) return;
                            scrollToMessage(pinnedMsg._id);
                        };
                        document.getElementById('pinned-text').innerText = pinnedMsg.content;
                        if (adminToken) {
                            document.getElementById('btn-unpin').classList.remove('hidden');
                            document.getElementById('btn-unpin').setAttribute('onclick', `unpinMessage('${pinnedMsg._id}')`);
                        }
                    } else {
                        document.getElementById('pinned-message-container').classList.add('hidden');
                    }

                    // 2. Thuật toán Chụp ảnh toàn cảnh (Snapshot)
                    const currentSnapshot = JSON.stringify(messages);
                    
                    if (currentSnapshot !== lastMessagesSnapshot) {
                        // Ghi nhớ xem người dùng có đang đọc ở đáy màn hình không
                        const isAtBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 50;
                        
                        chatBox.innerHTML = ''; 
                        messages.forEach(msg => renderSingleMessage({
                            id: msg._id,
                            uuid: msg.uuid,
                            content: msg.content,
                            replyToText: msg.replyToText,
                            createdAt: msg.createdAt,
                            reactions: msg.reactions 
                        }));
                        
                        // Chỉ tự động cuộn xuống đáy nếu CÓ TIN MỚI, hoặc họ ĐANG Ở SẴN ĐÁY
                        if (messages.length > lastMessageCount || isAtBottom) {
                            scrollToBottom();
                        }

                        // Cập nhật lại ảnh chụp và số đếm
                        lastMessagesSnapshot = currentSnapshot;
                        lastMessageCount = messages.length; 
                    }
                }
            } catch (error) {
                console.error('Lỗi khi tải tin nhắn:', error);
            }
        }
        // --- HÀM KIỂM TRA VÀ KHÓA CỨNG KHUNG CHAT ---
        async function checkBanStatus() {
            try {
                // Gọi API để kiểm tra xem tài khoản/thiết bị này có bị Ban không
                const response = await fetch(`https://my-tale.onrender.com/api/check-ban?uuid=${myUUID}`);
                const data = await response.json();
                
                const sendBtn = document.querySelector('button[onclick="sendMessage()"]');

                if (data.isBanned) {
                    isBanned = true; // Cập nhật biến trạng thái
                    
                    // Khóa ô nhập liệu, đổi sang màu đỏ cảnh báo
                    chatInput.value = 'Tài khoản/Thiết bị đã bị khóa vĩnh viễn.';
                    chatInput.disabled = true;
                    chatInput.classList.add('bg-rose-100', 'text-rose-600', 'cursor-not-allowed', 'border-rose-400');
                    
                    // Khóa luôn nút Gửi
                    if(sendBtn) {
                        sendBtn.disabled = true;
                        sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    }
                } else if (isBanned) {
                    // Nếu trước đó bị Ban nhưng vừa được Admin "Ân xá", thì mở khóa lại
                    isBanned = false;
                    chatInput.value = '';
                    chatInput.disabled = false;
                    chatInput.classList.remove('bg-rose-100', 'text-rose-600', 'cursor-not-allowed', 'border-rose-400');
                    
                    if(sendBtn) {
                        sendBtn.disabled = false;
                        sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    }
                }
            } catch (error) {
                console.error('Lỗi kiểm tra trạng thái:', error);
            }
        }
        // Hàm gửi tin nhắn thật lên Trạm kiểm duyệt
        async function sendMessage() {
            if (isBanned) {
                alert("Thiết bị của bạn đã bị cấm!");
                return;
            }

            const text = chatInput.value.trim();
            if (!text) return;

            const payload = {
                uuid: plainUUID,
                content: text,
                replyToId: replyingToId,
                replyToText: replyingToId ? replyTargetText.innerText.replace(/"/g, '') : null
            };

            // Tạm khóa ô nhập khi đang gửi
            chatInput.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    // Gửi an toàn và thành công
                    chatInput.value = '';
                    cancelReply();
                    fetchMessages(); // Ép tải lại ngay lập tức
                } else if (response.status === 403) {
                    // PHÁT HIỆN TỪ NGỮ VI PHẠM -> KÍCH HOẠT BAN (CẤM)
                    isBanned = true;
                    alert("🚨 " + data.message); // Báo động đỏ
                    chatInput.value = 'Thiết bị đã bị khóa mõm.';
                    chatInput.classList.add('bg-rose-100', 'text-rose-600', 'cursor-not-allowed', 'border-rose-400');
                } else {
                    alert("Lỗi: " + data.message);
                }
            } catch (error) {
                console.error("Lỗi gửi tin nhắn:", error);
                alert("Không thể kết nối đến máy chủ.");
            } finally {
                if (!isBanned) {
                    chatInput.disabled = false;
                    chatInput.focus();
                }
            }
        }
        async function pinMessage(msgId) {
            const adminToken = localStorage.getItem('mytales_token');
            if (!adminToken) return alert('Bạn không có quyền thực hiện!');
            
            if (confirm('Bạn muốn ghim thông báo này lên đầu trang?')) {
                await fetch(`https://my-tale.onrender.com/api/messages/${msgId}/pin`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                lastMessageCount = 0; // Ép tải lại toàn bộ
                fetchMessages();
            }
        }

        async function unpinMessage(msgId) {
            const adminToken = localStorage.getItem('mytales_token');
            if (confirm('Gỡ bỏ ghim thông báo này?')) {
                await fetch(`https://my-tale.onrender.com/api/messages/${msgId}/unpin`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                lastMessageCount = 0;
                fetchMessages();
            }
        }
        // Khởi động hệ thống khi mở web
        window.onload = () => {
            fetchMessages(); // Tải tin nhắn lần đầu
            checkBanStatus(); // Kiểm tra trạng thái Ban ngay khi vào web
            
            // Cứ 3 giây lại chạy hàm cập nhật 1 lần
            setInterval(() => {
                fetchMessages();
                checkBanStatus(); 
            }, 3000); 
        };
        // Xử lý ẩn/hiện nút Cuộn xuống
        const scrollBtn = document.getElementById('scroll-bottom-btn');
        chatBox.addEventListener('scroll', () => {
            // Nếu người dùng cuộn lên quá 150px so với đáy, hiện nút
            if (chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight > 150) {
                scrollBtn.classList.remove('hidden');
            } else {
                scrollBtn.classList.add('hidden');
            }
        });
        // Bật nút Admin nếu có thẻ
        if (localStorage.getItem('mytales_token')) {
            document.getElementById('btn-admin-dashboard').classList.remove('hidden');
        }

        // --- HÀM TỐ CÁO (USER) ---
        async function reportMessage(msgId, reportedUuid, content) {
            if (!confirm('Bạn muốn tố cáo người dùng này vi phạm tiêu chuẩn cộng đồng?')) return;
            try {
                const response = await fetch('https://my-tale.onrender.com/api/reports', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reporterUuid: plainUUID, reportedUuid, messageId: msgId, messageContent: content })
                });
                const data = await response.json();
                alert(data.message);
            } catch (error) { console.error(error); }
        }

        // --- HÀM QUẢN TRỊ (ADMIN) ---
        async function openAdminPanel() {
            document.getElementById('admin-modal').classList.remove('hidden');
            const adminToken = localStorage.getItem('mytales_token');
            const listContainer = document.getElementById('admin-reports-list');
            listContainer.innerHTML = '<p class="text-center">Đang tải dữ liệu...</p>';

            try {
                const response = await fetch('https://my-tale.onrender.com/api/reports', {
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                const reports = await response.json();
                
                if (reports.length === 0) {
                    listContainer.innerHTML = '<p class="text-center text-gray-500">Tuyệt vời! Không có báo cáo vi phạm nào.</p>';
                    return;
                }

                listContainer.innerHTML = reports.map(r => `
                    <div class="bg-white border border-rose-200 p-4 rounded-xl shadow-sm">
                        <p class="text-xs text-gray-500 mb-1">Kẻ bị kiện: <b>${r.reportedUuid}</b></p>
                        <p class="text-sm bg-gray-100 p-2 rounded mb-3 border-l-4 border-rose-400">"${r.messageContent}"</p>
                        <div class="flex gap-2">
                            <button onclick="resolveReport('${r._id}', 'ban', '${r.reportedUuid}')" class="bg-rose-500 text-white px-3 py-1 rounded text-sm hover:bg-rose-600">Khóa Vĩnh Viễn</button>
                            <button onclick="resolveReport('${r._id}', 'ignore', '${r.reportedUuid}')" class="bg-gray-300 text-gray-700 px-3 py-1 rounded text-sm hover:bg-gray-400">Bỏ Qua</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) { console.error(error); }
        }

        function closeAdminPanel() { document.getElementById('admin-modal').classList.add('hidden'); }

        async function resolveReport(reportId, action, reportedUuid) {
            const adminToken = localStorage.getItem('mytales_token');
            await fetch(`https://my-tale.onrender.com/api/reports/${reportId}/resolve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
                body: JSON.stringify({ action, reportedUuid })
            });
            openAdminPanel(); // Tải lại danh sách
        }

        async function manualBan() {
            const target = document.getElementById('manual-ban-input').value.trim();
            if (!target) return alert('Vui lòng nhập chính xác định danh cần khóa!');
            
            if (!confirm(`Bạn có chắc chắn muốn khóa vĩnh viễn định danh: ${target}?`)) return;

            const adminToken = localStorage.getItem('mytales_token');
            try {
                const res = await fetch('https://my-tale.onrender.com/api/ban', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
                    body: JSON.stringify({ target })
                });
                const data = await res.json();
                alert(data.message);
                
                if (res.ok) {
                    document.getElementById('manual-ban-input').value = ''; // Xóa chữ trong ô nhập sau khi cấm thành công
                }
            } catch (error) {
                console.error(error);
                alert('Không thể kết nối đến máy chủ để thực hiện lệnh khóa.');
            }
        }
        // --- HÀM ADMIN ÂN XÁ (GỠ CẤM) ---
        async function manualUnban() {
            const target = document.getElementById('unban-input').value.trim();
            if (!target) return alert('Vui lòng nhập chính xác định danh cần ân xá!');

            const adminToken = localStorage.getItem('mytales_token');
            try {
                // Nhớ đổi thành http://localhost:5000 nếu bạn đang test local nhé!
                const res = await fetch('https://my-tale.onrender.com/api/unban', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
                    body: JSON.stringify({ target })
                });

                const data = await res.json();
                
                // Pop-up thông báo rõ ràng kết quả từ Server
                alert(data.message);

                // Nếu Server báo thành công (res.ok = true) thì mới xóa chữ trong ô nhập
                if (res.ok) {
                    document.getElementById('unban-input').value = '';
                }
            } catch (error) {
                console.error('Lỗi khi ân xá:', error);
                alert('Không thể kết nối đến máy chủ để thực hiện lệnh ân xá. Hãy kiểm tra lại Server Render!');
            }
        }
        // Hàm gọi chuông thông báo
        function showToastNotification() {
            const toast = document.getElementById('toast-notification');
            toast.classList.remove('translate-x-full');
            // Tự động cất thông báo sau 3 giây
            setTimeout(() => {
                toast.classList.add('translate-x-full');
            }, 3000);
        }
        // Hàm cuộn đến tin nhắn cụ thể
        function scrollToMessage(msgId) {
            const targetMsg = document.getElementById(`message-bubble-${msgId}`);
            if (targetMsg) {
                // Cuộn mượt mà đến giữa màn hình
                targetMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // Tạo hiệu ứng nháy sáng màu tím để gây chú ý
                const bubble = targetMsg.querySelector('div[class*="max-w-[85vw]"]');
                if (bubble) {
                    const originalBg = bubble.className;
                    bubble.classList.add('bg-purple-300', 'transition-colors', 'duration-500');
                    setTimeout(() => {
                        bubble.classList.remove('bg-purple-300');
                    }, 1500);
                }
            } else {
                alert("Tin nhắn này đã cũ và không còn hiển thị trên màn hình.");
            }
        }
        // Hàm Xóa tin nhắn
        async function deleteMessage(msgId) {
            if (!confirm('Bạn có chắc chắn muốn xóa tin nhắn này vĩnh viễn?')) return;

            const adminToken = localStorage.getItem('mytales_token');
            const headers = { 'Content-Type': 'application/json' };
            if (adminToken) headers['Authorization'] = 'Bearer ' + adminToken;

            try {
                const response = await fetch(`${API_URL}/${msgId}`, {
                    method: 'DELETE',
                    headers: headers,
                    body: JSON.stringify({ uuid: plainUUID })
                });

                if (response.ok) {
                    lastMessageCount = 0; // Ép tải lại toàn bộ
                    fetchMessages();
                } else {
                    const data = await response.json();
                    alert(data.message);
                }
            } catch (error) {
                console.error("Lỗi xóa tin:", error);
            }
        }
        // Bật/tắt bảng chọn Cảm xúc
        window.toggleOptionsMenu = function(event, msgId) {
            event.stopPropagation(); // Ngăn chặn click nhầm ra ngoài
            
            // Đóng tất cả menu khác đang mở
            document.querySelectorAll('div[id^="options-menu-"]').forEach(menu => {
                if (menu.id !== `options-menu-${msgId}`) menu.classList.add('hidden');
            });
            document.querySelectorAll('div[id^="react-picker-"]').forEach(picker => picker.classList.add('hidden'));
            
            // Mở menu của tin nhắn hiện tại
            const menu = document.getElementById(`options-menu-${msgId}`);
            if(menu) menu.classList.toggle('hidden');
        };

        // Bật/tắt bảng chọn Cảm xúc
        window.toggleReactPicker = function(event, msgId) {
            event.stopPropagation();
            
            // Đóng tất cả các bảng cảm xúc khác
            document.querySelectorAll('div[id^="react-picker-"]').forEach(el => {
                if(el.id !== `react-picker-${msgId}`) el.classList.add('hidden');
            });
            
            // Mở bảng cảm xúc hiện tại, đồng thời ẩn cái menu 3 chấm đi cho gọn
            const picker = document.getElementById(`react-picker-${msgId}`);
            if (picker) picker.classList.toggle('hidden');
            
            const menu = document.getElementById(`options-menu-${msgId}`);
            if(menu) menu.classList.add('hidden');
        };

        // Lắng nghe sự kiện click trên toàn màn hình: Chạm ra ngoài thì đóng hết Menu
        document.addEventListener('click', function(event) {
            if (!event.target.closest('.option-dropdown-container')) {
                document.querySelectorAll('div[id^="options-menu-"]').forEach(menu => menu.classList.add('hidden'));
                document.querySelectorAll('div[id^="react-picker-"]').forEach(picker => picker.classList.add('hidden'));
            }
        });

        // Gửi cảm xúc lên Backend
        async function submitReaction(msgId, type) {
            document.getElementById(`react-picker-${msgId}`).classList.add('hidden'); // Đóng bảng
            try {
                const response = await fetch(`${API_URL}/${msgId}/react`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uuid: plainUUID, type: type })
                });
                if (response.ok) {
                    lastMessageCount = 0; // Ép tải lại toàn bộ tin nhắn để cập nhật tim
                    fetchMessages();
                }
            } catch (error) { console.error('Lỗi gửi cảm xúc:', error); }
        }
       // --- HỆ THỐNG TRÌNH PHÁT NHẠC (BẢN CHUẨN) ---
        
        // 1. Luôn luôn khai báo hàm toàn cục trước
        window.toggleMusic = function() {
            const audio = document.getElementById('bg-audio');
            if (!audio) return; // Không có nhạc thì đứng im
            
            const disk = document.getElementById('record-disk');
            const playBtnIcon = document.getElementById('icon-play-pause');
            
            if (audio.paused) {
                audio.play();
                if(disk) { disk.classList.add('spinning'); disk.classList.remove('paused'); }
                if(playBtnIcon) playBtnIcon.classList.replace('ph-play-circle', 'ph-pause-circle');
                localStorage.setItem('mytale_music_playing', 'true');
            } else {
                audio.pause();
                if(disk) disk.classList.add('paused');
                if(playBtnIcon) playBtnIcon.classList.replace('ph-pause-circle', 'ph-play-circle');
                localStorage.setItem('mytale_music_playing', 'false');
            }
        };

        // 2. Chờ trang web tải xong 100% mới khôi phục trí nhớ
        window.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-audio');
            if (!audio) return;

            const disk = document.getElementById('record-disk');
            const playBtnIcon = document.getElementById('icon-play-pause');
            const volumeSlider = document.getElementById('volume-slider');

            const savedTime = localStorage.getItem('mytale_music_time') || 0;
            const isPlaying = localStorage.getItem('mytale_music_playing') === 'true';
            const savedVolume = localStorage.getItem('mytale_music_volume') || 0.5;

            audio.volume = savedVolume;
            if (volumeSlider) volumeSlider.value = savedVolume;
            audio.currentTime = savedTime;

            if (isPlaying) {
                audio.play().then(() => {
                    if(disk) { disk.classList.add('spinning'); disk.classList.remove('paused'); }
                    if(playBtnIcon) playBtnIcon.classList.replace('ph-play-circle', 'ph-pause-circle');
                }).catch(() => {
                    // Nếu trình duyệt chặn tự động phát
                    if(disk) disk.classList.add('paused');
                    if(playBtnIcon) playBtnIcon.classList.replace('ph-pause-circle', 'ph-play-circle');
                    localStorage.setItem('mytale_music_playing', 'false');
                });
            }

            if (volumeSlider) {
                volumeSlider.addEventListener('input', (e) => {
                    audio.volume = e.target.value;
                    localStorage.setItem('mytale_music_volume', e.target.value);
                });
            }

            setInterval(() => {
                if (!audio.paused) {
                    localStorage.setItem('mytale_music_time', audio.currentTime);
                }
            }, 1000);
        });
    </script>
    <div id="music-player" class="fixed bottom-6 left-6 z-50 glass-panel border border-sakura-mid/50 shadow-sakura rounded-full p-2 flex items-center gap-3 transition-all duration-300 hover:pr-4 group max-w-[200px] md:max-w-[250px] opacity-40 hover:opacity-100 sm:opacity-100">
        
        <div class="relative w-12 h-12 flex-shrink-0 cursor-pointer" onclick="toggleMusic()">
            <img id="record-disk" src="AVT/dia_nhac.jpg" alt="Vinyl" class="...">
            <div class="absolute inset-0 rounded-full border-2 border-sakura-dark/30 flex items-center justify-center">
                <div class="w-3 h-3 bg-white rounded-full shadow-inner"></div>
            </div>
        </div>

        <div class="hidden md:flex group-hover:flex flex-col gap-1 w-full overflow-hidden transition-all">
            <div class="flex items-center justify-between gap-2">
                <button onclick="toggleMusic()" class="text-sakura-dark hover:text-rose-500 transition-colors">
                    <i id="icon-play-pause" class="ph-fill ph-play-circle text-2xl"></i>
                </button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" class="w-16 h-1.5 bg-sakura-mid rounded-lg appearance-none cursor-pointer accent-sakura-dark">
            </div>
            <p class="text-[10px] text-text-muted font-bold truncate">🎵 Giai điệu Thanh Xuân</p>
        </div>
    </div>

    <audio id="bg-audio" loop src="music/hope1.mp3"></audio>
</body>
